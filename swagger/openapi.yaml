        '200': { description: User deleted }

  /admin/drivers:
    get:
      tags: [Admin]
      summary: List drivers (admin)
      security: [{ BearerAuth: [] }]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: per_page
