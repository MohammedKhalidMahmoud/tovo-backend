                properties:
                  data: { $ref: '#/components/schemas/Captain' }

  /admin/drivers/{id}:
    get:
      tags: [Admin]
      summary: Get driver details (admin)
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Driver details
          content:
            application/json:
              schema:
                properties:
                  data: { $ref: '#/components/schemas/Captain' }
    patch:
      tags: [Admin]
      summary: Update driver (verify/ban)
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              properties:
                isVerified: { type: boolean }
                isBanned: { type: boolean }
                notes: { type: string }
      responses:
        '200': { description: Driver updated }
    put:
