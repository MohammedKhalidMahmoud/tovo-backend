              properties:
                body: { type: string }
      responses:
        '201': { description: Message sent }

  # ── ADMIN ─────────────────────────────────────────────────────────────────
  /admin/login:
    post:
      tags: [Admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                properties:
                  data:
                    properties:
                      access_token: { type: string }
                      refresh_token: { type: string }
