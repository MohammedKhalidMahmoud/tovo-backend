openapi: 3.0.3
info:
  title: Tovo Ride-Hailing API
  description: |
    Complete REST API for the **Tovo** ride-hailing application.
    
    ## Authentication
    All protected endpoints require a Bearer JWT token:
    ```
    Authorization: Bearer <access_token>
    ```
    
    ## Roles
    - **Public** — No token required
    - **User** — Passenger JWT
    - **Captain** — Driver JWT
  version: 1.0.0
  contact:
    name: Tovo Backend Team

servers:
  - url: http://localhost:3000/api/v1
    description: Local Development
  - url: https://api.tovo.app/v1
    description: Production

tags:
  - name: Auth
    description: Authentication & Identity
  - name: Users
    description: Passenger profile management
  - name: Captains
    description: Driver profile management
  - name: Trips
    description: Trip booking lifecycle
  - name: Locations
    description: Location search & nearby captains
  - name: Vehicle Types
    description: Available vehicle categories
  - name: Promotions
    description: Offers, banners, and coupons
  - name: Notifications
    description: Push notifications
  - name: Support
    description: Customer support tickets
  - name: Admin
    description: Administrative operations (users, drivers, rides, settings)
  - name: Settings
    description: App language and preferences
  - name: Dashboard
    description: Public and admin dashboard endpoints
  - name: FAQs
    description: Frequently asked questions (public read, admin manage)
  - name: SOS
    description: Emergency SOS alerts (user/captain trigger, admin view)
  - name: Services
    description: Ride/delivery service types (public read, admin manage)
  - name: Regions
    description: Geographic service zones (admin manage)
  - name: Vehicle Models
    description: Allowed vehicle model whitelist (public read, admin manage)

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ── COMMON ──────────────────────────────────────────────────────────────
    SuccessResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        message: { type: string }
        data: { type: object }

    ErrorResponse:
      type: object
      properties:
        success: { type: boolean, example: false }
        message: { type: string }
        errors: { type: array, items: { type: object } }

    Pagination:
      type: object
      properties:
        page: { type: integer, example: 1 }
        per_page: { type: integer, example: 20 }
        total: { type: integer, example: 100 }
        total_pages: { type: integer, example: 5 }

    # ── USER ────────────────────────────────────────────────────────────────
    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        email: { type: string, format: email }
        phone: { type: string }
        avatarUrl: { type: string, nullable: true }
        role: { type: string, enum: [user] }
        isVerified: { type: boolean }
        language: { type: string, example: en }
        createdAt: { type: string, format: date-time }

    # ── CAPTAIN ─────────────────────────────────────────────────────────────
    Captain:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        email: { type: string, format: email }
        phone: { type: string }
        avatarUrl: { type: string, nullable: true }
        rating: { type: number, format: float, example: 4.8 }
        totalTrips: { type: integer }
        isOnline: { type: boolean }
        vehicle:
          $ref: '#/components/schemas/Vehicle'

    # ── VEHICLE ─────────────────────────────────────────────────────────────
    VehicleType:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string, example: Regular Car }
        description: { type: string }
        imageUrl: { type: string }
        baseFare: { type: number, example: 15.00 }
        perKmRate: { type: number, example: 5.00 }

    Vehicle:
      type: object
      properties:
        id:  { type: string, format: uuid }
        vin: { type: string }
        type:
          $ref: '#/components/schemas/VehicleType'
        vehicleModel:
          $ref: '#/components/schemas/VehicleModel'

    VehicleDetail:
      type: object
      properties:
        id:        { type: string, format: uuid }
        vin:       { type: string, example: 1HGCM82633A123456 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        type:
          $ref: '#/components/schemas/VehicleType'
        captain:
          type: object
          properties:
            id:    { type: string, format: uuid }
            name:  { type: string }
            email: { type: string, format: email }
            phone: { type: string }

    # ── TRIP ────────────────────────────────────────────────────────────────
    Trip:
      type: object
      properties:
        id: { type: string, format: uuid }
        status:
          type: string
          enum: [searching, matched, on_way, in_progress, completed, cancelled]
        pickupAddress: { type: string }
        dropoffAddress: { type: string }
        pickupLat: { type: number }
        pickupLng: { type: number }
        dropoffLat: { type: number }
        dropoffLng: { type: number }
        fare: { type: number, example: 300.00 }
        currency: { type: string, example: EGP }
        distanceKm: { type: number }
        durationMinutes: { type: integer }
        vehicleType:
          $ref: '#/components/schemas/VehicleType'
        # additional helpers for dashboard responses
        totalAmount: { type: number }
        startAddress: { type: string }
        driver:
          type: object
          properties:
            firstName: { type: string }
            lastName: { type: string }
        isSchedule: { type: boolean }
        scheduleDatetime:
          type: string
          format: date-time
        captain:
          $ref: '#/components/schemas/Captain'
        createdAt: { type: string, format: date-time }
        startedAt: { type: string, format: date-time, nullable: true }
        endedAt: { type: string, format: date-time, nullable: true }

    # ── PAYMENT ─────────────────────────────────────────────────────────────
    PaymentMethod:
      type: object
      properties:
        id: { type: string, format: uuid }
        brand: { type: string, enum: [visa, mastercard, apple_pay] }
        lastFour: { type: string, example: '1234' }
        maskedNumber: { type: string, example: '482 *** ****** ****' }
        isDefault: { type: boolean }
        expiry: { type: string, example: '12/26' }

    # ── WALLET ──────────────────────────────────────────────────────────────
    Wallet:
      type: object
      properties:
        id: { type: string, format: uuid }
        balance: { type: number, example: 350.00 }
        currency: { type: string, example: EGP }
        userId: { type: string, format: uuid, nullable: true }
        captainId: { type: string, format: uuid, nullable: true }
        user:
          nullable: true
          type: object
          properties:
            name: { type: string }
            email: { type: string, format: email }
            phone: { type: string }
        captain:
          nullable: true
          type: object
          properties:
            name: { type: string }
            email: { type: string, format: email }
            phone: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    # ── FAQ ─────────────────────────────────────────────────────────────────
    Faq:
      type: object
      properties:
        id:        { type: string, format: uuid }
        question:  { type: string }
        answer:    { type: string }
        order:     { type: integer, example: 0 }
        isActive:  { type: boolean, example: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    # ── REGION ───────────────────────────────────────────────────────────────
    Region:
      type: object
      properties:
        id:        { type: string, format: uuid }
        name:      { type: string, example: Cairo }
        country:   { type: string, example: Egypt }
        city:      { type: string, nullable: true, example: Cairo }
        lat:       { type: number, nullable: true, example: 30.0444 }
        lng:       { type: number, nullable: true, example: 31.2357 }
        isActive:  { type: boolean, example: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    # ── SOS ALERT ────────────────────────────────────────────────────────────
    SosAlert:
      type: object
      properties:
        id:         { type: string, format: uuid }
        status:     { type: string, enum: [pending, handled], example: pending }
        lat:        { type: number, nullable: true, example: 30.0444 }
        lng:        { type: number, nullable: true, example: 31.2357 }
        message:    { type: string, nullable: true }
        resolvedAt: { type: string, format: date-time, nullable: true }
        createdAt:  { type: string, format: date-time }
        user:
          nullable: true
          type: object
          properties:
            name:  { type: string }
            email: { type: string, format: email }
            phone: { type: string }
        captain:
          nullable: true
          type: object
          properties:
            name:  { type: string }
            email: { type: string, format: email }
            phone: { type: string }

    # ── SERVICE ──────────────────────────────────────────────────────────────
    Service:
      type: object
      properties:
        id:        { type: string, format: uuid }
        name:      { type: string, example: Comfort }
        baseFare:  { type: number, example: 20.00 }
        isActive:  { type: boolean, example: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    # ── VEHICLE MODEL ────────────────────────────────────────────────────────
    VehicleModel:
      type: object
      properties:
        id:            { type: string, format: uuid }
        name:          { type: string, example: 'Toyota Camry' }
        brand:         { type: string, example: 'Toyota' }
        isActive:      { type: boolean, example: true }
        vehicleTypeId: { type: string, format: uuid, nullable: true }
        createdAt:     { type: string, format: date-time }
        updatedAt:     { type: string, format: date-time }

    # ── ADDRESS ─────────────────────────────────────────────────────────────
    SavedAddress:
      type: object
      properties:
        id: { type: string, format: uuid }
        label: { type: string, example: Home }
        address: { type: string }
        lat: { type: number }
        lng: { type: number }

    # ── RATING ──────────────────────────────────────────────────────────────
    Rating:
      type: object
      properties:
        id: { type: string, format: uuid }
        stars: { type: integer, minimum: 1, maximum: 5 }
        comment: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }

    # ── NOTIFICATION ────────────────────────────────────────────────────────
    Notification:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        body: { type: string }
        isRead: { type: boolean }
        createdAt: { type: string, format: date-time }

    # ── PROMOTION / COUPON ───────────────────────────────────────────────────
    Promotion:
      type: object
      properties:
        id: { type: string, format: uuid }
        code: { type: string }
        discount_type:
          type: string
          enum: [percentage, amount]
        discount: { type: number }
        expiry_date: { type: string, format: date-time, nullable: true }
        usage_limit: { type: integer, nullable: true }
        usage_limit_per_rider: { type: integer, nullable: true }
        min_amount: { type: number, nullable: true }
        max_discount: { type: number, nullable: true }
        coupon_type: { type: string, example: 'all' }
        status: { type: integer, example: 1 }
        used_count: { type: integer }
        createdAt: { type: string, format: date-time }

    # ── SUPPORT ─────────────────────────────────────────────────────────────
    SupportTicket:
      type: object
      properties:
        id: { type: string, format: uuid }
        subject: { type: string }
        status: { type: string, enum: [open, in_progress, resolved, closed] }
        messages:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              senderId: { type: string }
              body: { type: string }
              createdAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }

    AdminUser:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        email: { type: string, format: email }
        role: { type: string }
        status: { type: string }

    Complaint:
      type: object
      properties:
        id: { type: string, format: uuid }
        type: { type: string }
        userId: { type: string }
        driverId: { type: string }
        message: { type: string }
        status: { type: string }
        response: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }

    RideStats:
      type: object
      properties:
        totalRides: { type: integer }
        completed: { type: integer }
        canceled: { type: integer }
        revenue: { type: number }

    DriverReport:
      type: object
      properties:
        driverId: { type: string }
        ridesCompleted: { type: integer }
        averageRating: { type: number }
        totalEarnings: { type: number }

    UserReport:
      type: object
      properties:
        userId: { type: string }
        ridesTaken: { type: integer }
        totalSpent: { type: number }
        averageRating: { type: number }

    SystemSetting:
      type: object
      properties:
        key: { type: string }
        value: { type: string }
        description: { type: string, nullable: true }
        updatedAt: { type: string, format: date-time }

    RefundRequest:
      type: object
      properties:
        amount: { type: number }
        currency: { type: string }
        reason: { type: string }

    # ── ADMIN CREATE/UPDATE SCHEMAS ─────────────────────────────────────────
    UserCreate:
      type: object
      required: [name, email]
      properties:
        name: { type: string }
        email: { type: string, format: email }
        phone: { type: string }
        password: { type: string }
        language: { type: string, example: en }

    UserUpdate:
      type: object
      properties:
        name: { type: string }
        email: { type: string, format: email }
        phone: { type: string }
        language: { type: string }
        notificationsEnabled: { type: boolean }

    DriverCreate:
      type: object
      required: [name]
      properties:
        name: { type: string }
        email: { type: string, format: email }
        phone: { type: string }
        drivingLicense: { type: string }
        licenseExpiryDate: { type: string, format: date-time }

    DriverUpdate:
      type: object
      properties:
        name: { type: string }
        email: { type: string, format: email }
        phone: { type: string }
        drivingLicense: { type: string }
        licenseExpiryDate: { type: string, format: date-time }
        isVerified: { type: boolean }

    RideCreate:
      type: object
      required: [userId, pickupLat, pickupLng, dropoffLat, dropoffLng, pickupAddress, dropoffAddress]
      properties:
        userId: { type: string, format: uuid }
        captainId: { type: string, format: uuid }
        pickupLat: { type: number }
        pickupLng: { type: number }
        dropoffLat: { type: number }
        dropoffLng: { type: number }
        pickupAddress: { type: string }
        dropoffAddress: { type: string }
        fare: { type: number }
        distanceKm: { type: number }
        status: { type: string }

    RideUpdate:
      type: object
      properties:
        status: { type: string }
        fare: { type: number }
        captainId: { type: string, format: uuid }

# ════════════════════════════════════════════════════════════════════════════
# PATHS
# ════════════════════════════════════════════════════════════════════════════
paths:

  # ── AUTH ────────────────────────────────────────────────────────────────────
  /auth/register/user:
    post:
      tags: [Auth]
      summary: Register passenger account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, phone, password, confirm_password]
              properties:
                name: { type: string, example: Heba Yasser }
                email: { type: string, format: email }
                phone: { type: string, example: '+201012345678' }
                password: { type: string, minLength: 8 }
                confirm_password: { type: string }
      responses:
        '201':
          description: User registered
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/User'
        '409': { description: Email or phone already exists }

  /auth/register/captain:
    post:
      tags: [Auth]
      summary: Register captain (driver) account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, phone, driving_license, password, confirm_password, vehicle_model, vin]
              properties:
                name: { type: string }
                email: { type: string, format: email }
                phone: { type: string }
                driving_license: { type: string }
                password: { type: string, minLength: 8 }
                confirm_password: { type: string }
                vehicle_model: { type: string, example: 'Toyota Camry', description: "Exact name of an active VehicleModel from GET /vehicle-models. Registration is rejected if the model is not in the whitelist or is inactive." }
                vin: { type: string, description: Vehicle Identification Number }
      responses:
        '201': { description: Captain registered }
        '409': { description: Email or phone already exists }

  /auth/login:
    post:
      tags: [Auth]
      summary: Login for users and captains
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, role]
              properties:
                email: { type: string, format: email }
                password: { type: string }
                role: { type: string, enum: [user, captain] }
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                properties:
                  data:
                    properties:
                      access_token: { type: string }
                      refresh_token: { type: string }
                      role: { type: string }
                      user: { $ref: '#/components/schemas/User' }
        '401': { description: Invalid credentials }

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout and invalidate refresh token
      description: Invalidates the refresh token. Optionally pass `fcm_token` to deregister the device from push notifications.
      security: [{ BearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              properties:
                refreshToken: { type: string, example: eyJhbGciOi... }
                fcm_token: { type: string, description: FCM device token to deregister }
      responses:
        '200': { description: Logged out }

  /auth/token/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        '200':
          description: New access token
          content:
            application/json:
              schema:
                properties:
                  data:
                    properties:
                      access_token: { type: string }

  /auth/otp/send:
    post:
      tags: [Auth]
      summary: Send OTP to phone
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required: [phone]
              properties:
                phone: { type: string }
      responses:
        '200': { description: OTP sent }

  /auth/otp/verify:
    post:
      tags: [Auth]
      summary: Verify 6-digit OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required: [phone, otp_code]
              properties:
                phone: { type: string }
                otp_code: { type: string, minLength: 6, maxLength: 6 }
      responses:
        '200': { description: OTP verified }
        '400': { description: Invalid or expired OTP }

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        '200': { description: Reset email sent }

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password with token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required: [token, password]
              properties:
                token: { type: string }
                password: { type: string, minLength: 8 }
      responses:
        '200': { description: Password reset }

  /auth/social:
    post:
      tags: [Auth]
      summary: OAuth social login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required: [provider, access_token, role]
              properties:
                provider: { type: string, enum: [facebook, apple, google] }
                access_token: { type: string }
                role: { type: string, enum: [user, captain] }
      responses:
        '200': { description: Social login successful }

  # ── USERS ───────────────────────────────────────────────────────────────────
  /users/me:
    get:
      tags: [Users]
      summary: Get current user profile
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                properties:
                  data: { $ref: '#/components/schemas/User' }
    put:
      tags: [Users]
      summary: Update user profile
      security: [{ BearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              properties:
                name: { type: string }
                phone: { type: string }
                language: { type: string }
      responses:
        '200': { description: Profile updated }

  /users/me/avatar:
    patch:
      tags: [Users]
      summary: Upload profile photo
      security: [{ BearerAuth: [] }]
      requestBody:
        content:
          multipart/form-data:
            schema:
              properties:
                avatar: { type: string, format: binary }
      responses:
        '200': { description: Avatar updated }

  /users/me/wallet:
    get:
      tags: [Users]
      summary: Get wallet balance
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Wallet data
          content:
            application/json:
              schema:
                properties:
                  data: { $ref: '#/components/schemas/Wallet' }

  /users/me/addresses:
    get:
      tags: [Users]
      summary: List saved addresses
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Saved addresses
          content:
            application/json:
              schema:
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/SavedAddress' }
    post:
      tags: [Users]
      summary: Save a new address
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required: [label, address, lat, lng]
              properties:
                label: { type: string, example: Home }
                address: { type: string }
                lat: { type: number }
                lng: { type: number }
      responses:
        '201': { description: Address saved }

  /users/me/addresses/{id}:
    put:
      tags: [Users]
      summary: Update saved address
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SavedAddress'
      responses:
        '200': { description: Updated }
    delete:
      tags: [Users]
      summary: Delete saved address
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Deleted }

  /users/me/payment-methods:
    get:
      tags: [Users]
      summary: List saved payment cards
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Payment methods
          content:
            application/json:
              schema:
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/PaymentMethod' }
    post:
      tags: [Users]
      summary: Add payment card
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required: [brand]
              properties:
                brand: { type: string, enum: [visa, mastercard, apple_pay] }
                lastFour: { type: string }
                maskedNumber: { type: string }
                expiry: { type: string }
      responses:
        '201': { description: Card added }

  /users/me/payment-methods/{id}:
    delete:
      tags: [Users]
      summary: Remove a payment card
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Removed }

  /users/me/payment-methods/{id}/default:
    patch:
      tags: [Users]
      summary: Set card as default
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Default updated }

  # ── CAPTAINS ────────────────────────────────────────────────────────────────
  /captains/me:
    get:
      tags: [Captains]
      summary: Get captain profile
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Captain profile
          content:
            application/json:
              schema:
                properties:
                  data: { $ref: '#/components/schemas/Captain' }
    put:
      tags: [Captains]
      summary: Update captain profile
      security: [{ BearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              properties:
                name: { type: string }
                phone: { type: string }
      responses:
        '200': { description: Updated }

  /captains/me/duty/start:
    post:
      tags: [Captains]
      summary: Go on duty — captain becomes visible to the system and will receive nearby trip requests
      description: |
        Marks the captain as online. After calling this endpoint the captain **must** start emitting
        `captain.location_update` events over the WebSocket connection so their GPS position is kept
        up to date in the database. Trip requests are only broadcast to captains whose stored location
        falls within 10 km of the pickup point.
      security: [{ BearerAuth: [] }]
      responses:
        '200': { description: On duty }

  /captains/me/duty/end:
    post:
      tags: [Captains]
      summary: Go off duty — captain becomes invisible and stops receiving trip requests
      description: |
        Marks the captain as offline and clears their stored GPS coordinates. They will not appear
        in any subsequent nearby-captain queries until they call `/duty/start` again.
      security: [{ BearerAuth: [] }]
      responses:
        '200': { description: Off duty }

  /captains/me/wallet:
    get:
      tags: [Captains]
      summary: Get captain earnings/wallet
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Wallet data
          content:
            application/json:
              schema:
                properties:
                  data: { $ref: '#/components/schemas/Wallet' }

  /captains/me/insurance:
    get:
      tags: [Captains]
      summary: Get insurance cards
      security: [{ BearerAuth: [] }]
      responses:
        '200': { description: Insurance cards }

  /captains/me/trips:
    get:
      tags: [Captains]
      summary: Captain trip history & new requests
      security: [{ BearerAuth: [] }]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: per_page
          in: query
          schema: { type: integer, default: 20 }
      responses:
        '200': { description: Captain trips }

  /captains/me/trips/{id}/accept:
    patch:
      tags: [Captains]
      summary: Accept a trip request
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Trip accepted }
        '422': { description: Trip no longer available }

  /captains/me/trips/{id}/decline:
    patch:
      tags: [Captains]
      summary: Decline a trip request
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Trip declined }

  /captains/me/trips/{id}/start:
    patch:
      tags: [Captains]
      summary: Start the trip
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Trip started }

  /captains/me/trips/{id}/end:
    patch:
      tags: [Captains]
      summary: End the trip
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Trip completed }

  # ── TRIPS ───────────────────────────────────────────────────────────────────
  /trips/estimate:
    get:
      tags: [Trips]
      summary: Get fare estimate
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: pickup_lat,    in: query, required: true,  schema: { type: number } }
        - { name: pickup_lng,    in: query, required: true,  schema: { type: number } }
        - { name: dropoff_lat,   in: query, required: true,  schema: { type: number } }
        - { name: dropoff_lng,   in: query, required: true,  schema: { type: number } }
        - { name: service_id, in: query, required: false, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Fare estimate with commission breakdown
          content:
            application/json:
              schema:
                properties:
                  data:
                    type: object
                    properties:
                      distanceKm:    { type: number, example: 4.2 }
                      farePerKm:     { type: number, example: 5.0 }
                      baseFare:      { type: number, example: 20.0 }
                      serviceName:   { type: string, example: Comfort }
                      tripFare:      { type: number, example: 41.0, description: 'Captain earnings' }
                      commissionPct: { type: number, example: 15 }
                      commission:    { type: number, example: 6.15, description: "App's profit" }
                      totalFare:     { type: number, example: 47.15, description: 'Total charged to user' }
                      currency:      { type: string, example: EGP }

  /trips:
    post:
      tags: [Trips]
      summary: Create a new trip request
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required: [pickup_lat, pickup_lng, pickup_address, dropoff_lat, dropoff_lng, dropoff_address, vehicle_type_id, payment_method_id]
              properties:
                pickup_lat: { type: number }
                pickup_lng: { type: number }
                pickup_address: { type: string }
                dropoff_lat: { type: number }
                dropoff_lng: { type: number }
                dropoff_address: { type: string }
                plan_id: { type: string, format: uuid }
                payment_method_id: { type: string, format: uuid }
                promo_code: { type: string }
      responses:
        '201':
          description: Trip created
          content:
            application/json:
              schema:
                properties:
                  data: { $ref: '#/components/schemas/Trip' }
    get:
      tags: [Trips]
      summary: Get user trip history
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: page,     in: query, schema: { type: integer, default: 1 } }
        - { name: per_page, in: query, schema: { type: integer, default: 20 } }
      responses:
        '200': { description: Trip history }

  /trips/{id}:
    get:
      tags: [Trips]
      summary: Get trip details
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Trip details
          content:
            application/json:
              schema:
                properties:
                  data: { $ref: '#/components/schemas/Trip' }

  /trips/{id}/cancel:
    patch:
      tags: [Trips]
      summary: Cancel a trip
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Trip cancelled }
        '422': { description: Cannot be cancelled }

  /trips/{id}/rating:
    post:
      tags: [Trips]
      summary: Rate captain after completed trip
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required: [rating]
              properties:
                rating: { type: integer, minimum: 1, maximum: 5 }
                comment: { type: string }
      responses:
        '201': { description: Rating submitted }

  # ── LOCATIONS ───────────────────────────────────────────────────────────────
  /locations/search:
    get:
      tags: [Locations]
      summary: Autocomplete location search
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: q,     in: query, required: true,  schema: { type: string } }
        - { name: lat,   in: query, required: false, schema: { type: number } }
        - { name: lng,   in: query, required: false, schema: { type: number } }
        - { name: limit, in: query, required: false, schema: { type: integer, default: 10 } }
      responses:
        '200': { description: Location suggestions }

  /locations/nearby-captains:
    get:
      tags: [Locations]
      summary: Get nearby available captains
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: lat,             in: query, required: true,  schema: { type: number } }
        - { name: lng,             in: query, required: true,  schema: { type: number } }
        - { name: vehicle_type_id, in: query, required: false, schema: { type: string } }
        - { name: radius_km,       in: query, required: false, schema: { type: number, default: 5 } }
      responses:
        '200': { description: Nearby captains list }

  /locations/reverse-geocode:
    post:
      tags: [Locations]
      summary: Convert coordinates to address
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required: [lat, lng]
              properties:
                lat: { type: number }
                lng: { type: number }
      responses:
        '200': { description: Address string }

  # ── VEHICLE TYPES ───────────────────────────────────────────────────────────
  /vehicle-types:
    get:
      tags: [Vehicle Types]
      summary: List all vehicle types
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Vehicle types
          content:
            application/json:
              schema:
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/VehicleType' }

  /vehicle-types/{id}:
    get:
      tags: [Vehicle Types]
      summary: Get specific vehicle type
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Vehicle type }
        '404': { description: Not found }

  # ── PROMOTIONS ──────────────────────────────────────────────────────────────
  /promotions:
    get:
      tags: [Promotions]
      summary: List active coupons
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Coupon list
          content:
            application/json:
              schema:
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Promotion' }

  /promotions/coupons:
    get:
      tags: [Promotions]
      summary: List coupons (admin)
      security: [{ BearerAuth: [] }]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: status
          in: query
          schema: { type: string, enum: [all, active, inactive] }
        - name: search
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Coupon list
          content:
            application/json:
              schema:
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Promotion' }
                  pagination: { $ref: '#/components/schemas/Pagination' }
    post:
      tags: [Promotions]
      summary: Create a new coupon (admin)
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Promotion'
      responses:
        '201':
          description: Coupon created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Promotion'
  /promotions/coupons/{id}:
    get:
      tags: [Promotions]
      summary: Get coupon by id (admin)
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Coupon details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Promotion'
        '404': { description: Not found }
    put:
      tags: [Promotions]
      summary: Update coupon (admin)
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Promotion'
      responses:
        '200':
          description: Coupon updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Promotion'
    delete:
      tags: [Promotions]
      summary: Delete coupon (admin)
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Coupon deleted }

  /promotions/coupons/validate:
    post:
      tags: [Promotions]
      summary: Validate and apply a coupon
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required: [code]
              properties:
                code: { type: string }
      responses:
        '200': { description: Coupon valid }
        '404': { description: Coupon not found }
        '422': { description: Expired or invalid }

  # ── NOTIFICATIONS ────────────────────────────────────────────────────────────
  /notifications:
    get:
      tags: [Notifications]
      summary: List notifications
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: page, in: query, schema: { type: integer, default: 1 } }
      responses:
        '200': { description: Notifications }

  /notifications/{id}/read:
    patch:
      tags: [Notifications]
      summary: Mark notification as read
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Marked as read }

  /notifications/read-all:
    patch:
      tags: [Notifications]
      summary: Mark all notifications as read
      security: [{ BearerAuth: [] }]
      responses:
        '200': { description: All marked read }

  /notifications/device-token:
    post:
      tags: [Notifications]
      summary: Register FCM/APNs device token
      description: Call this immediately after login to register the device for push notifications. Tokens are upserted so duplicate calls are safe.
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required: [token, platform]
              properties:
                token: { type: string, example: dGhpcyBpcyBhIHRlc3QgdG9rZW4 }
                platform: { type: string, enum: [ios, android, web] }
      responses:
        '200': { description: Token registered }
        '422': { description: Validation error }

  /notifications/send-to-user:
    post:
      tags: [Notifications]
      summary: Send push notification to a user (Admin)
      description: Sends an FCM push to all devices registered by the given user. Protected by `X-Admin-Key` header.
      parameters:
        - name: X-Admin-Key
          in: header
          required: true
          schema: { type: string }
          description: Secret admin key from ADMIN_API_KEY env var
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required: [user_id, title, body]
              properties:
                user_id: { type: string, format: uuid }
                title: { type: string, example: Your ride is on the way! }
                body: { type: string, example: Your captain is 2 minutes away. }
                data: { type: object, description: Optional key-value data payload, example: { tripId: abc-123 } }
      responses:
        '200':
          description: Notification sent
          content:
            application/json:
              schema:
                properties:
                  sent: { type: integer, example: 2 }
                  failed: { type: integer, example: 0 }
        '403': { description: Invalid or missing admin key }
        '422': { description: Validation error }

  /notifications/send-to-captain:
    post:
      tags: [Notifications]
      summary: Send push notification to a captain (Admin)
      description: Sends an FCM push to all devices registered by the given captain. Protected by `X-Admin-Key` header.
      parameters:
        - name: X-Admin-Key
          in: header
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required: [captain_id, title, body]
              properties:
                captain_id: { type: string, format: uuid }
                title: { type: string, example: New trip request! }
                body: { type: string, example: A passenger is waiting 1.2 km away. }
                data: { type: object, description: Optional key-value data payload, example: { tripId: abc-123 } }
      responses:
        '200':
          description: Notification sent
          content:
            application/json:
              schema:
                properties:
                  sent: { type: integer, example: 1 }
                  failed: { type: integer, example: 0 }
        '403': { description: Invalid or missing admin key }
        '422': { description: Validation error }

  # ── SUPPORT ─────────────────────────────────────────────────────────────────
  /support/tickets:
    post:
      tags: [Support]
      summary: Create support ticket
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required: [subject]
              properties:
                subject: { type: string }
      responses:
        '201': { description: Ticket created }
    get:
      tags: [Support]
      summary: List support tickets
      security: [{ BearerAuth: [] }]
      responses:
        '200': { description: Tickets list }

  /support/tickets/{id}:
    get:
