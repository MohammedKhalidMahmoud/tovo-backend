  # ── VEHICLE MODELS (public) ──────────────────────────────────────────────────
  /vehicle-models:
    get:
      tags: [Vehicle Models]
      summary: List active vehicle models
      description: Public endpoint — returns all active (whitelisted) models for use in the captain registration screen.
      responses:
        '200':
          description: List of active vehicle models
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/VehicleModel' }

  # ── VEHICLE MODELS (admin) ────────────────────────────────────────────────────
  /admin/vehicle-models:
    get:
      tags: [Vehicle Models]
      summary: List all vehicle models (admin)
      description: Returns all models (active and inactive). Requires admin JWT.
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: All vehicle models
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/VehicleModel' }

    post:
      tags: [Vehicle Models]
      summary: Create a vehicle model (admin)
      description: Add a new model to the registration whitelist.
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, brand]
              properties:
                name:          { type: string, example: 'Toyota Camry' }
                brand:         { type: string, example: 'Toyota' }
                isActive:      { type: boolean, example: true }
                vehicleTypeId: { type: string, format: uuid, nullable: true, description: 'Link to VehicleType so the captain is auto-assigned to the correct service category.' }
      responses:
        '201':
          description: Vehicle model created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: '#/components/schemas/VehicleModel' }
        '409': { description: Model with this name already exists }

  /admin/vehicle-models/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }

    get:
      tags: [Vehicle Models]
      summary: Get a vehicle model (admin)
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Vehicle model details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: '#/components/schemas/VehicleModel' }
        '404': { description: Vehicle model not found }

    put:
      tags: [Vehicle Models]
      summary: Update a vehicle model (admin)
      description: Update name, brand, isActive flag, or vehicleTypeId. Set isActive=false to block new registrations with this model.
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:          { type: string, example: 'Toyota Camry 2024' }
                brand:         { type: string, example: 'Toyota' }
                isActive:      { type: boolean, example: false }
                vehicleTypeId: { type: string, format: uuid, nullable: true }
      responses:
        '200':
          description: Vehicle model updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: '#/components/schemas/VehicleModel' }
        '404': { description: Vehicle model not found }

    delete:
      tags: [Vehicle Models]
      summary: Delete a vehicle model (admin)
      security: [{ BearerAuth: [] }]
      parameters:
        - name: confirm
          in: query
          required: true
          schema: { type: string, enum: ['true'] }
          description: Must be "true" to confirm the deletion.
      responses:
        '200': { description: Vehicle model deleted }
        '404': { description: Vehicle model not found }
    patch:
      tags: [Services]
      summary: Update a service (admin)
      description: Update name, baseFare, or isActive status of a service.
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:     { type: string, example: Comfort }
                baseFare: { type: number, example: 25.00 }
                isActive: { type: boolean, example: true }
      responses:
        '200':
          description: Service updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: '#/components/schemas/Service' }
        '404': { description: Service not found }
