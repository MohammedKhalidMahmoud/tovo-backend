      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                properties:
                  data: { $ref: '#/components/schemas/User' }
    patch:
      tags: [Admin]
      summary: Update user (suspend/activate)
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              properties:
                isSuspended: { type: boolean }
                notes: { type: string }
      responses:
        '200': { description: User updated }
    put:
      tags: [Admin]
      summary: Replace/Update user (admin)
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                properties:
                  data: { $ref: '#/components/schemas/User' }
    delete:
      tags: [Admin]
      summary: Delete user (admin)
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
