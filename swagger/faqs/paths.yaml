/faqs:
  get:
    tags: [FAQs]
    summary: List active FAQs
    security: []
    responses:
      '200':
        description: Active FAQ list
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data:
                      type: array
                      items: { $ref: '#/components/schemas/Faq' }

/faqs/{id}:
  get:
    tags: [FAQs]
    summary: Get an active FAQ by ID
    security: []
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: FAQ retrieved
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data: { $ref: '#/components/schemas/Faq' }
      '400': { description: Validation error }
      '404': { description: FAQ not found }

/admin/faqs:
  get:
    tags: [FAQs]
    summary: List all FAQs (admin)
    security: [{ BearerAuth: [] }]
    parameters:
      - name: page
        in: query
        schema: { type: integer, default: 1 }
      - name: limit
        in: query
        schema: { type: integer, default: 20 }
      - name: isActive
        in: query
        schema: { type: boolean }
      - name: search
        in: query
        description: Search by question or answer
        schema: { type: string }
    responses:
      '200':
        description: FAQ list
        headers:
          X-Total-Count: { schema: { type: integer } }
          X-Total-Pages: { schema: { type: integer } }
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data:
                      type: array
                      items: { $ref: '#/components/schemas/Faq' }
      '401': { description: Unauthorized }
      '403': { description: Forbidden }
  post:
    tags: [FAQs]
    summary: Create an FAQ (admin)
    security: [{ BearerAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [question, answer]
            properties:
              question: { type: string }
              answer: { type: string }
              order: { type: integer, minimum: 0, default: 0 }
              isActive: { type: boolean, default: true }
    responses:
      '201':
        description: FAQ created
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data: { $ref: '#/components/schemas/Faq' }
      '400': { description: Validation error }
      '401': { description: Unauthorized }
      '403': { description: Forbidden }

/admin/faqs/{id}:
  get:
    tags: [FAQs]
    summary: Get an FAQ by ID (admin)
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: FAQ retrieved
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data: { $ref: '#/components/schemas/Faq' }
      '401': { description: Unauthorized }
      '403': { description: Forbidden }
      '404': { description: FAQ not found }
  put:
    tags: [FAQs]
    summary: Update an FAQ (admin)
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              question: { type: string }
              answer: { type: string }
              order: { type: integer, minimum: 0 }
              isActive: { type: boolean }
    responses:
      '200':
        description: FAQ updated
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data: { $ref: '#/components/schemas/Faq' }
      '400': { description: Validation error }
      '401': { description: Unauthorized }
      '403': { description: Forbidden }
      '404': { description: FAQ not found }
  delete:
    tags: [FAQs]
    summary: Delete an FAQ (admin)
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: FAQ deleted
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data:
                      nullable: true
      '401': { description: Unauthorized }
      '403': { description: Forbidden }
      '404': { description: FAQ not found }
