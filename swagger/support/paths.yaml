/support/tickets:
  post:
    tags: [Support]
    summary: Create support ticket
    security: [{ BearerAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            required: [subject]
            properties:
              subject: { type: string }
    responses:
      '201': { description: Ticket created }
  get:
    tags: [Support]
    summary: List support tickets
    security: [{ BearerAuth: [] }]
    responses:
      '200': { description: Tickets list }

/support/tickets/{id}:
  get:
    tags: [Support]
    summary: Get ticket details
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    responses:
      '200': { description: Ticket }
      '404': { description: Not found }

/support/tickets/{id}/messages:
  post:
    tags: [Support]
    summary: Reply to a ticket
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            required: [body]
            properties:
              body: { type: string }
    responses:
      '201': { description: Message sent }

/admin/support:
  get:
    tags: [Support]
    summary: List all support tickets (admin)
    security: [{ BearerAuth: [] }]
    parameters:
      - { name: page, in: query, schema: { type: integer, default: 1 } }
      - { name: limit, in: query, schema: { type: integer, default: 20 } }
      - { name: status, in: query, schema: { type: string } }
      - { name: type, in: query, schema: { type: string } }
      - { name: search, in: query, schema: { type: string } }
    responses:
      '200': { description: Paginated ticket list }
      '401': { description: Unauthorized }
      '403': { description: Forbidden }

/admin/support/{id}:
  get:
    tags: [Support]
    summary: Get any support ticket by ID (admin)
    security: [{ BearerAuth: [] }]
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    responses:
      '200': { description: Ticket detail }
      '404': { description: Not found }

/admin/support/{id}/respond:
  post:
    tags: [Support]
    summary: Add admin response to a ticket
    security: [{ BearerAuth: [] }]
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            required: [response]
            properties:
              response: { type: string }
    responses:
      '200': { description: Response sent }

/admin/support/{id}/resolve:
  patch:
    tags: [Support]
    summary: Mark a support ticket as resolved
    security: [{ BearerAuth: [] }]
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    responses:
      '200': { description: Ticket resolved }
