/support:
  post:
    tags: [Support]
    summary: Create support ticket
    security: [{ BearerAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [subject]
            properties:
              subject: { type: string }
    responses:
      '201':
        description: Ticket created
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data: { $ref: '#/components/schemas/SupportTicket' }
      '400': { description: Validation error }
      '401': { description: Unauthorized }

  get:
    tags: [Support]
    summary: List authenticated user's tickets
    security: [{ BearerAuth: [] }]
    parameters:
      - name: page
        in: query
        schema: { type: integer, default: 1 }
      - name: per_page
        in: query
        schema: { type: integer, default: 20 }
    responses:
      '200':
        description: Ticket list
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data:
                      type: array
                      items: { $ref: '#/components/schemas/SupportTicket' }
      '401': { description: Unauthorized }

/support/{id}:
  get:
    tags: [Support]
    summary: Get ticket by ID for authenticated user
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: Ticket details
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data: { $ref: '#/components/schemas/SupportTicket' }
      '401': { description: Unauthorized }
      '404': { description: Ticket not found }

/support/{id}/messages:
  post:
    tags: [Support]
    summary: Add ticket message
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [body]
            properties:
              body: { type: string }
    responses:
      '201': { description: Message sent }
      '400': { description: Validation error }
      '401': { description: Unauthorized }

/admin/support:
  get:
    tags: [Support]
    summary: List all support tickets (admin)
    security: [{ BearerAuth: [] }]
    parameters:
      - name: page
        in: query
        schema: { type: integer, default: 1 }
      - name: limit
        in: query
        schema: { type: integer, default: 20 }
      - name: status
        in: query
        schema: { type: string }
      - name: type
        in: query
        schema: { type: string }
      - name: search
        in: query
        schema: { type: string }
    responses:
      '200': { description: Ticket list }
      '401': { description: Unauthorized }
      '403': { description: Forbidden }

/admin/support/{id}:
  get:
    tags: [Support]
    summary: Get support ticket by ID (admin)
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200': { description: Ticket details }
      '401': { description: Unauthorized }
      '403': { description: Forbidden }
      '404': { description: Ticket not found }

/admin/support/{id}/respond:
  post:
    tags: [Support]
    summary: Respond to support ticket (admin)
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [response]
            properties:
              response: { type: string }
    responses:
      '200': { description: Response submitted }
      '400': { description: Validation error }
      '401': { description: Unauthorized }
      '403': { description: Forbidden }

/admin/support/{id}/resolve:
  patch:
    tags: [Support]
    summary: Resolve support ticket (admin)
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200': { description: Ticket resolved }
      '400': { description: Validation error }
      '401': { description: Unauthorized }
      '403': { description: Forbidden }
