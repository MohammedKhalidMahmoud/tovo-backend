/admin/settings:
  get:
    tags: [Settings]
    summary: Get system settings
    security: [{ BearerAuth: [] }]
    responses:
      '200':
        description: Settings list
        content:
          application/json:
            schema:
              properties:
                data:
                  type: array
                  items: { $ref: '#/components/schemas/SystemSetting' }
  put:
    tags: [Settings]
    summary: Update app-wide settings
    security: [{ BearerAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            properties:
              currency:             { type: string }
              defaultLanguage:      { type: string }
              notificationSettings: { type: object }
    responses:
      '200': { description: Settings updated }
