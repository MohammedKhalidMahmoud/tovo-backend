# ════════════════════════════════════════════════════════════════════════════
# DRIVERS MODULE — paths.yaml
# Covers: /api/v1/drivers  (driver-facing) + /api/v1/admin/drivers  (admin)
# ════════════════════════════════════════════════════════════════════════════

# ── DRIVER-FACING ROUTES ────────────────────────────────────────────────────

/drivers/me:
  get:
    tags: [Drivers]
    summary: Get driver profile
    description: Returns the authenticated driver's full profile.
    security: [{ BearerAuth: [] }]
    responses:
      '200':
        description: Driver profile retrieved successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data: { $ref: '#/components/schemas/Driver' }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

  put:
    tags: [Drivers]
    summary: Update driver profile
    description: Updates one or more fields on the authenticated driver's profile.
    security: [{ BearerAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
                example: Khaled Hassan
              phone:
                type: string
                example: '+201012345678'
              language:
                type: string
                enum: [en, ar]
                example: ar
              notificationsEnabled:
                type: boolean
                example: true
    responses:
      '200':
        description: Profile updated successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data: { $ref: '#/components/schemas/Driver' }
      '400':
        description: Validation error
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

/drivers/me/avatar:
  patch:
    tags: [Drivers]
    summary: Upload profile avatar
    description: Uploads a new profile photo for the authenticated driver. Accepts `multipart/form-data`.
    security: [{ BearerAuth: [] }]
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required: [avatar]
            properties:
              avatar:
                type: string
                format: binary
                description: Image file (jpg, png, webp recommended)
    responses:
      '200':
        description: Avatar updated successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        avatarUrl: { type: string, example: 'https://cdn.tovo.app/avatars/driver-abc.jpg' }
      '400':
        description: No file uploaded or invalid format
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

# ── Duty ─────────────────────────────────────────────────────────────────────

/drivers/me/duty/start:
  post:
    tags: [Drivers]
    summary: Go on duty
    description: |
      Marks the driver as online and visible to the dispatch system.

      After calling this endpoint the driver **must** start emitting
      `driver.location_update` events over the WebSocket connection so their
      GPS position is kept up to date. Trip requests are only broadcast to
      drivers whose stored location falls within **10 km** of the pickup point.
    security: [{ BearerAuth: [] }]
    responses:
      '200':
        description: Driver is now on duty
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        onlineStatus: { type: string, example: online }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '409':
        description: Driver is already on duty
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

/drivers/me/duty/end:
  post:
    tags: [Drivers]
    summary: Go off duty
    description: |
      Marks the driver as offline and clears their stored GPS coordinates.
      They will not appear in any subsequent nearby-driver queries until
      they call `/duty/start` again.
    security: [{ BearerAuth: [] }]
    responses:
      '200':
        description: Driver is now off duty
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        onlineStatus: { type: string, example: offline }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '409':
        description: Driver is already off duty
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

# ── Wallet ────────────────────────────────────────────────────────────────────

/drivers/me/wallet:
  get:
    tags: [Drivers]
    summary: Get driver wallet & earnings
    description: Returns the authenticated driver's wallet balance, currency, and earnings summary.
    security: [{ BearerAuth: [] }]
    responses:
      '200':
        description: Wallet data retrieved successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data: { $ref: '#/components/schemas/Wallet' }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

# ── Insurance ─────────────────────────────────────────────────────────────────

/drivers/me/insurance:
  get:
    tags: [Drivers]
    summary: Get insurance cards
    description: Returns all active insurance card records associated with the authenticated driver.
    security: [{ BearerAuth: [] }]
    responses:
      '200':
        description: Insurance cards retrieved successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        type: object
                        properties:
                          id:          { type: string, format: uuid }
                          provider:    { type: string, example: 'Misr Insurance' }
                          policyNumber:{ type: string, example: 'POL-20240001' }
                          expiryDate:  { type: string, format: date, example: '2025-12-31' }
                          status:      { type: string, enum: [active, expired], example: active }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

# ── Trip Management (Driver side) ────────────────────────────────────────────

/drivers/me/trips:
  get:
    tags: [Drivers]
    summary: List driver trips
    description: Returns the authenticated driver's trip history and any pending incoming requests.
    security: [{ BearerAuth: [] }]
    parameters:
      - name: page
        in: query
        schema: { type: integer, minimum: 1, default: 1, example: 1 }
        description: Page number
      - name: per_page
        in: query
        schema: { type: integer, minimum: 1, maximum: 100, default: 20, example: 20 }
        description: Results per page
    responses:
      '200':
        description: Driver trips retrieved successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data:
                      type: array
                      items: { $ref: '#/components/schemas/Trip' }
                    pagination: { $ref: '#/components/schemas/Pagination' }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

/drivers/me/trips/{id}/accept:
  patch:
    tags: [Drivers]
    summary: Accept a trip request
    description: |
      Driver accepts an incoming trip request. The trip status transitions to `accepted`.
      Returns `422` if the trip was already taken by another driver or cancelled by the user.
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        description: UUID of the trip
        schema: { type: string, format: uuid, example: 'b2c3d4e5-f6a7-8901-bcde-f12345678901' }
    responses:
      '200':
        description: Trip accepted successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data: { $ref: '#/components/schemas/Trip' }
      '400':
        description: Validation error (id must be a valid UUID)
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '404':
        description: Trip not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '422':
        description: Trip no longer available (already taken or cancelled)
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

/drivers/me/trips/{id}/decline:
  patch:
    tags: [Drivers]
    summary: Decline a trip request
    description: Driver declines an incoming trip request. The request will be broadcast to other nearby drivers.
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        description: UUID of the trip
        schema: { type: string, format: uuid, example: 'b2c3d4e5-f6a7-8901-bcde-f12345678901' }
    responses:
      '200':
        description: Trip declined successfully
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SuccessResponse' }
      '400':
        description: Validation error (id must be a valid UUID)
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '404':
        description: Trip not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '422':
        description: Trip is not in a declinable state
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

/drivers/me/trips/{id}/start:
  patch:
    tags: [Drivers]
    summary: Start a trip
    description: |
      Driver marks the trip as started (passenger has been picked up).
      Trip status transitions from `accepted` → `in_progress`.
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        description: UUID of the trip
        schema: { type: string, format: uuid, example: 'b2c3d4e5-f6a7-8901-bcde-f12345678901' }
    responses:
      '200':
        description: Trip started successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data: { $ref: '#/components/schemas/Trip' }
      '400':
        description: Validation error (id must be a valid UUID)
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '404':
        description: Trip not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '422':
        description: Trip is not in an accepted state
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

/drivers/me/trips/{id}/end:
  patch:
    tags: [Drivers]
    summary: End a trip
    description: |
      Driver marks the trip as completed (passenger has been dropped off).
      Trip status transitions from `in_progress` → `completed`.
      Fare calculation and wallet settlement are triggered server-side.
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        description: UUID of the trip
        schema: { type: string, format: uuid, example: 'b2c3d4e5-f6a7-8901-bcde-f12345678901' }
    responses:
      '200':
        description: Trip completed successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data: { $ref: '#/components/schemas/Trip' }
      '400':
        description: Validation error (id must be a valid UUID)
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '404':
        description: Trip not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '422':
        description: Trip is not currently in progress
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

/drivers/me/trips/{tripId}/credit-customer:
  post:
    tags: [Drivers]
    summary: Credit customer wallet from trip
    description: Driver credits a customer's wallet after completing a trip. Trip must be completed and belong to the authenticated driver. Creates a wallet transaction with reason `driver_credit`.
    security: [{ BearerAuth: [] }]
    parameters:
      - name: tripId
        in: path
        required: true
        description: UUID of the completed trip
        schema: { type: string, format: uuid, example: 'b2c3d4e5-f6a7-8901-bcde-f12345678901' }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [amount]
            properties:
              amount:
                type: number
                example: 50.00
                description: Positive amount to credit to customer wallet
    responses:
      '200':
        description: Customer wallet credited successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data: { $ref: '#/components/schemas/Wallet' }
      '400':
        description: Validation error (invalid tripId format or amount must be positive)
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '403':
        description: Forbidden — trip does not belong to this driver
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '404':
        description: Trip not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '422':
        description: Trip must be completed to credit customer wallet
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

# ════════════════════════════════════════════════════════════════════════════
# ADMIN ROUTES  —  prefix: /api/v1/admin/drivers
# ════════════════════════════════════════════════════════════════════════════

/admin/drivers:
  get:
    tags: [Drivers]
    summary: List all drivers
    description: Returns a paginated, filterable, and searchable list of all drivers/drivers. Admin only.
    security: [{ BearerAuth: [] }]
    parameters:
      - name: page
        in: query
        schema: { type: integer, minimum: 1, example: 1 }
        description: Page number (must be > 0)
      - name: limit
        in: query
        schema: { type: integer, minimum: 1, maximum: 100, example: 20 }
        description: Results per page (1–100)
      - name: sortBy
        in: query
        schema:
          type: string
          enum: [createdAt, rating, totalTrips, totalEarnings]
          example: createdAt
        description: Field to sort results by
      - name: sortOrder
        in: query
        schema:
          type: string
          enum: [asc, desc]
          example: desc
        description: Sort direction
      - name: search
        in: query
        schema: { type: string, minLength: 1, maxLength: 100, example: khaled }
        description: Search by name, email, or phone
      - name: status
        in: query
        schema:
          type: string
          enum: [all, active, suspended, pending, rejected]
          example: active
        description: Filter by account status
      - name: isVerified
        in: query
        schema:
          type: string
          enum: [all, verified, unverified, pending]
          example: verified
        description: Filter by document verification status
      - name: onlineStatus
        in: query
        schema:
          type: string
          enum: [all, online, offline]
          example: online
        description: Filter by current duty status
    responses:
      '200':
        description: Drivers list retrieved successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data:
                      type: array
                      items: { $ref: '#/components/schemas/Driver' }
                    pagination: { $ref: '#/components/schemas/Pagination' }
      '400':
        description: Validation error in query params
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '403':
        description: Forbidden — admin role required
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

  post:
    tags: [Drivers]
    summary: Create a new driver
    description: Admin creates a new driver account directly.
    security: [{ BearerAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [name]
            properties:
              name:
                type: string
                example: Mahmoud Saad
              email:
                type: string
                format: email
                example: mahmoud@example.com
              phone:
                type: string
                example: '+201155667788'
              drivingLicense:
                type: string
                example: 'DL-20240099'
    responses:
      '201':
        description: Driver created successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data: { $ref: '#/components/schemas/Driver' }
      '400':
        description: Validation error
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '403':
        description: Forbidden — admin role required
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '409':
        description: Email or phone already in use
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

/admin/drivers/{driverId}:
  get:
    tags: [Drivers]
    summary: Get driver by ID
    description: Returns detailed information about a specific driver. Admin only.
    security: [{ BearerAuth: [] }]
    parameters:
      - name: driverId
        in: path
        required: true
        description: UUID of the driver
        schema: { type: string, format: uuid, example: 'a1b2c3d4-e5f6-7890-abcd-ef1234567890' }
    responses:
      '200':
        description: Driver details retrieved successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data: { $ref: '#/components/schemas/Driver' }
      '400':
        description: Validation error (driverId must be a valid UUID)
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '403':
        description: Forbidden — admin role required
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '404':
        description: Driver not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

  put:
    tags: [Drivers]
    summary: Update driver information
    description: Admin updates one or more profile fields for a specific driver.
    security: [{ BearerAuth: [] }]
    parameters:
      - name: driverId
        in: path
        required: true
        description: UUID of the driver
        schema: { type: string, format: uuid, example: 'a1b2c3d4-e5f6-7890-abcd-ef1234567890' }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
                minLength: 2
                maxLength: 100
                example: Khaled Nour
              email:
                type: string
                format: email
                example: khaled@example.com
              phone:
                type: string
                example: '+201012345678'
              language:
                type: string
                enum: [en, ar]
                example: en
              drivingLicense:
                type: string
                minLength: 5
                maxLength: 50
                example: 'DL-20240099'
              licenseExpiryDate:
                type: string
                format: date-time
                example: '2026-06-30T00:00:00Z'
    responses:
      '200':
        description: Driver updated successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data: { $ref: '#/components/schemas/Driver' }
      '400':
        description: Validation error
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '403':
        description: Forbidden — admin role required
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '404':
        description: Driver not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

  delete:
    tags: [Drivers]
    summary: Delete a driver account
    description: |
      Permanently deletes a driver account. **Irreversible.**
      Requires `confirm=true` as a query parameter to prevent accidental deletion.
    security: [{ BearerAuth: [] }]
    parameters:
      - name: driverId
        in: path
        required: true
        description: UUID of the driver
        schema: { type: string, format: uuid, example: 'a1b2c3d4-e5f6-7890-abcd-ef1234567890' }
      - name: confirm
        in: query
        required: true
        description: Must be `true` to confirm permanent deletion
        schema: { type: string, enum: ['true'], example: 'true' }
    responses:
      '200':
        description: Driver deleted successfully
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SuccessResponse' }
      '400':
        description: Validation error or missing confirm=true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '403':
        description: Forbidden — admin role required
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '404':
        description: Driver not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

/admin/drivers/{driverId}/approve:
  post:
    tags: [Drivers]
    summary: Approve driver verification
    description: Approves a driver's submitted documents and activates their account.
    security: [{ BearerAuth: [] }]
    parameters:
      - name: driverId
        in: path
        required: true
        description: UUID of the driver
        schema: { type: string, format: uuid, example: 'a1b2c3d4-e5f6-7890-abcd-ef1234567890' }
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              reason:
                type: string
                maxLength: 500
                example: 'All documents verified and valid.'
    responses:
      '200':
        description: Driver approved successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data: { $ref: '#/components/schemas/Driver' }
      '400':
        description: Validation error
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '403':
        description: Forbidden — admin role required
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '404':
        description: Driver not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '409':
        description: Driver is already approved
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

/admin/drivers/{driverId}/reject:
  post:
    tags: [Drivers]
    summary: Reject driver application
    description: Rejects a driver's submitted documents. A reason is required.
    security: [{ BearerAuth: [] }]
    parameters:
      - name: driverId
        in: path
        required: true
        description: UUID of the driver
        schema: { type: string, format: uuid, example: 'a1b2c3d4-e5f6-7890-abcd-ef1234567890' }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [reason]
            properties:
              reason:
                type: string
                minLength: 10
                maxLength: 500
                example: 'Driving license image was blurry and unreadable.'
    responses:
      '200':
        description: Driver application rejected successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data: { $ref: '#/components/schemas/Driver' }
      '400':
        description: Validation error (reason required, min 10 chars)
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '403':
        description: Forbidden — admin role required
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '404':
        description: Driver not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

/admin/drivers/{driverId}/suspend:
  post:
    tags: [Drivers]
    summary: Suspend or unsuspend a driver
    description: |
      Toggles the suspension status of a driver account.
      Use `action: "suspend"` to suspend and `action: "unsuspend"` to lift a suspension.
      This is the single canonical route for suspension management.
    security: [{ BearerAuth: [] }]
    parameters:
      - name: driverId
        in: path
        required: true
        description: UUID of the driver
        schema: { type: string, format: uuid, example: 'a1b2c3d4-e5f6-7890-abcd-ef1234567890' }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [action]
            properties:
              action:
                type: string
                enum: [suspend, unsuspend]
                example: suspend
              reason:
                type: string
                minLength: 5
                maxLength: 500
                example: 'Multiple passenger complaints within 7 days.'
              durationDays:
                type: integer
                minimum: 1
                maximum: 365
                example: 14
                description: Optional suspension duration in days. If omitted, suspension is indefinite.
    responses:
      '200':
        description: Suspension status updated successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data: { $ref: '#/components/schemas/Driver' }
      '400':
        description: Validation error
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '403':
        description: Forbidden — admin role required
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '404':
        description: Driver not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

/admin/drivers/{driverId}/refund:
  post:
    tags: [Drivers]
    summary: Issue a refund to driver wallet
    description: Credits a refund amount directly to the driver's in-app wallet. Optionally linked to a trip.
    security: [{ BearerAuth: [] }]
    parameters:
      - name: driverId
        in: path
        required: true
        description: UUID of the driver
        schema: { type: string, format: uuid, example: 'a1b2c3d4-e5f6-7890-abcd-ef1234567890' }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [amount, currency, reason]
            properties:
              amount:
                type: number
                format: float
                minimum: 0.01
                example: 50.00
                description: Refund amount (must be > 0)
              currency:
                type: string
                minLength: 3
                maxLength: 3
                example: EGP
                description: ISO 4217 currency code (3 characters, uppercased automatically)
              tripId:
                type: string
                format: uuid
                example: 'b2c3d4e5-f6a7-8901-bcde-f12345678901'
                description: Optional trip UUID this refund is associated with
              reason:
                type: string
                minLength: 5
                maxLength: 200
                example: 'Incorrect fare deduction due to system error.'
    responses:
      '200':
        description: Refund issued successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data: { $ref: '#/components/schemas/Wallet' }
      '400':
        description: Validation error
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '403':
        description: Forbidden — admin role required
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '404':
        description: Driver not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

