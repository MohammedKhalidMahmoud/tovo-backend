/admin/complaints:
  get:
    tags: [Admin]
    summary: List all complaints
    security: [{ BearerAuth: [] }]
    parameters:
      - name: page
        in: query
        schema: { type: integer, default: 1 }
      - name: limit
        in: query
        schema: { type: integer, default: 20 }
      - name: status
        in: query
        schema: { type: string }
      - name: type
        in: query
        schema: { type: string }
      - name: search
        in: query
        schema: { type: string }
    responses:
      '200': { description: Complaints list }

/admin/complaints/{id}:
  get:
    tags: [Admin]
    summary: Get complaint details
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200': { description: Complaint details }

/admin/complaints/{id}/respond:
  post:
    tags: [Admin]
    summary: Respond to complaint
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            properties:
              response: { type: string }
    responses:
      '200': { description: Response sent }

/admin/complaints/{id}/resolve:
  post:
    tags: [Admin]
    summary: Mark complaint resolved
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200': { description: Complaint resolved }
