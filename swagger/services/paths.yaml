/services:
  get:
    tags: [Services]
    summary: List active services
    description: Returns all active services. No authentication required.
    responses:
      '200':
        description: Active services retrieved
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                data:
                  type: array
                  items: { $ref: '#/components/schemas/Service' }

/services/{id}:
  get:
    tags: [Services]
    summary: Get an active service by ID
    description: Returns the service only if it is active. Returns 404 for inactive services.
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: Service retrieved
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean }
                data:    { $ref: '#/components/schemas/Service' }
      '404': { description: Service not found or inactive }

/admin/services:
  get:
    tags: [Services]
    summary: List all services (admin)
    description: Returns all services including inactive ones.
    security: [{ BearerAuth: [] }]
    responses:
      '200':
        description: Services retrieved
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean }
                data:
                  type: array
                  items: { $ref: '#/components/schemas/Service' }
      '401': { description: Unauthorized }
      '403': { description: Forbidden }
  post:
    tags: [Services]
    summary: Create a new service (admin)
    security: [{ BearerAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [name]
            properties:
              name:     { type: string, example: Comfort }
              baseFare: { type: number, example: 25.00 }
              isActive: { type: boolean, example: true }
    responses:
      '201':
        description: Service created successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                data:    { $ref: '#/components/schemas/Service' }
      '400': { description: Validation error or service name already exists }
      '401': { description: Unauthorized }
      '403': { description: Forbidden }

/admin/services/{id}:
  get:
    tags: [Services]
    summary: Get a service by ID (admin)
    description: Returns any service regardless of active status.
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: Service retrieved
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean }
                data:    { $ref: '#/components/schemas/Service' }
      '401': { description: Unauthorized }
      '403': { description: Forbidden }
      '404': { description: Service not found }
  patch:
    tags: [Services]
    summary: Update a service (admin)
    description: Update name, baseFare, or isActive status.
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              name:     { type: string, example: Comfort }
              baseFare: { type: number, example: 25.00 }
              isActive: { type: boolean, example: true }
    responses:
      '200':
        description: Service updated
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean }
                data:    { $ref: '#/components/schemas/Service' }
      '401': { description: Unauthorized }
      '403': { description: Forbidden }
      '404': { description: Service not found }
  delete:
    tags: [Services]
    summary: Delete a service (admin)
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: Service deleted successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                message: { type: string, example: Service deleted successfully }
      '401': { description: Unauthorized }
      '403': { description: Forbidden }
      '404': { description: Service not found }

/admin/services/{id}/image:
  patch:
    tags: [Services]
    summary: Update service image (admin)
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required: [image]
            properties:
              image:
                type: string
                format: binary
    responses:
      '200':
        description: Image updated
        content:
          application/json:
            schema:
              type: object
              properties:
                success:  { type: boolean, example: true }
                data:
                  type: object
                  properties:
                    imageUrl: { type: string, example: 'https://example.com/uploads/service-123.jpg' }
      '400': { description: No file uploaded }
      '401': { description: Unauthorized }
      '403': { description: Forbidden }
      '404': { description: Service not found }
