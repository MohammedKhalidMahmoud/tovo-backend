/admin/services:
  get:
    tags: [Services]
    summary: List all services (admin)
    description: Returns all services including inactive ones.
    security: [{ BearerAuth: [] }]
    parameters:
      - name: page
        in: query
        schema: { type: integer, example: 1 }
      - name: limit
        in: query
        schema: { type: integer, example: 20 }
    responses:
      '200':
        description: Services retrieved
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean }
                data:
                  type: array
                  items: { $ref: '#/components/schemas/Service' }
  post:
    tags: [Services]
    summary: Create a new service (admin)
    description: Create a new service with name, baseFare, and activation status.
    security: [{ BearerAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [name]
            properties:
              name:     { type: string, example: Comfort }
              baseFare: { type: number, example: 25.00 }
              isActive: { type: boolean, example: true }
    responses:
      '201':
        description: Service created successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                data:    { $ref: '#/components/schemas/Service' }
      '400': { description: Validation error or service already exists }
      '401': { description: Unauthorized }

/admin/services/{id}:
  get:
    tags: [Services]
    summary: Get single service (admin)
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: Service details
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean }
                data:    { $ref: '#/components/schemas/Service' }
      '404': { description: Service not found }
  patch:
    tags: [Services]
    summary: Update a service (admin)
    description: Update name, baseFare, or isActive status of a service.
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              name:     { type: string, example: Comfort }
              baseFare: { type: number, example: 25.00 }
              isActive: { type: boolean, example: true }
    responses:
      '200':
        description: Service updated
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean }
                data:    { $ref: '#/components/schemas/Service' }
      '404': { description: Service not found }
