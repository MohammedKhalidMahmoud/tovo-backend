# ════════════════════════════════════════════════════════════════════════════
# USERS MODULE — paths.yaml
# Covers: /api/v1/users  (user-facing) + /api/v1/admin/users  (admin)
# ════════════════════════════════════════════════════════════════════════════

# ── USER-FACING ROUTES ───────────────────────────────────────────────────────

/users/me:
  get:
    tags: [Users]
    summary: Get current user profile
    description: Returns the authenticated user's full profile.
    security: [{ BearerAuth: [] }]
    responses:
      '200':
        description: User profile retrieved successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data: { $ref: '#/components/schemas/User' }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

  put:
    tags: [Users]
    summary: Update user profile
    description: Updates one or more fields on the authenticated user's profile.
    security: [{ BearerAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
                example: Ahmed Ali
              phone:
                type: string
                example: '+201012345678'
              language:
                type: string
                enum: [en, ar]
                example: en
              notificationsEnabled:
                type: boolean
                example: true
    responses:
      '200':
        description: Profile updated successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data: { $ref: '#/components/schemas/User' }
      '400':
        description: Validation error
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

/users/me/avatar:
  patch:
    tags: [Users]
    summary: Upload profile avatar
    description: Uploads a new profile photo for the authenticated user. Accepts `multipart/form-data`.
    security: [{ BearerAuth: [] }]
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required: [avatar]
            properties:
              avatar:
                type: string
                format: binary
                description: Image file (jpg, png, webp recommended)
    responses:
      '200':
        description: Avatar updated successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        avatarUrl: { type: string, example: 'https://cdn.tovo.app/avatars/abc.jpg' }
      '400':
        description: No file uploaded or invalid format
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

/users/me/wallet:
  get:
    tags: [Users]
    summary: Get wallet balance
    description: Returns the authenticated user's wallet including balance and currency.
    security: [{ BearerAuth: [] }]
    responses:
      '200':
        description: Wallet data retrieved successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data: { $ref: '#/components/schemas/Wallet' }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

# ── Saved Addresses ───────────────────────────────────────────────────────────

/users/me/addresses:
  get:
    tags: [Users]
    summary: List saved addresses
    description: Returns all saved addresses for the authenticated user.
    security: [{ BearerAuth: [] }]
    responses:
      '200':
        description: Saved addresses retrieved successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data:
                      type: array
                      items: { $ref: '#/components/schemas/SavedAddress' }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

  post:
    tags: [Users]
    summary: Save a new address
    description: Creates a new saved address entry for the authenticated user.
    security: [{ BearerAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [label, address, lat, lng]
            properties:
              label:
                type: string
                example: Home
              address:
                type: string
                example: '123 Tahrir Square, Cairo'
              lat:
                type: number
                format: float
                example: 30.0444
              lng:
                type: number
                format: float
                example: 31.2357
    responses:
      '201':
        description: Address saved successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data: { $ref: '#/components/schemas/SavedAddress' }
      '400':
        description: Validation error
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

/users/me/addresses/{id}:
  put:
    tags: [Users]
    summary: Update a saved address
    description: Updates fields on an existing saved address by ID.
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        description: UUID of the saved address
        schema: { type: string, format: uuid, example: 'a1b2c3d4-e5f6-7890-abcd-ef1234567890' }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              label:
                type: string
                example: Work
              address:
                type: string
                example: '456 Corniche, Alexandria'
              lat:
                type: number
                format: float
                example: 31.2001
              lng:
                type: number
                format: float
                example: 29.9187
    responses:
      '200':
        description: Address updated successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data: { $ref: '#/components/schemas/SavedAddress' }
      '400':
        description: Validation error (id must be a valid UUID)
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '404':
        description: Address not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

  delete:
    tags: [Users]
    summary: Delete a saved address
    description: Permanently removes a saved address by ID.
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        description: UUID of the saved address
        schema: { type: string, format: uuid, example: 'a1b2c3d4-e5f6-7890-abcd-ef1234567890' }
    responses:
      '200':
        description: Address deleted successfully
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SuccessResponse' }
      '400':
        description: Validation error (id must be a valid UUID)
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '404':
        description: Address not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

# ── Payment Methods ───────────────────────────────────────────────────────────

/users/me/payment-methods:
  get:
    tags: [Users]
    summary: List saved payment methods
    description: Returns all payment cards/methods saved by the authenticated user.
    security: [{ BearerAuth: [] }]
    responses:
      '200':
        description: Payment methods retrieved successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data:
                      type: array
                      items: { $ref: '#/components/schemas/PaymentMethod' }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

  post:
    tags: [Users]
    summary: Add a payment method
    description: Adds a new payment card or method to the authenticated user's account.
    security: [{ BearerAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [brand]
            properties:
              brand:
                type: string
                enum: [visa, mastercard, apple_pay]
                example: visa
              lastFour:
                type: string
                example: '4242'
              maskedNumber:
                type: string
                example: '**** **** **** 4242'
              expiry:
                type: string
                example: '12/27'
    responses:
      '201':
        description: Payment method added successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data: { $ref: '#/components/schemas/PaymentMethod' }
      '400':
        description: Validation error
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

/users/me/payment-methods/{id}:
  delete:
    tags: [Users]
    summary: Remove a payment method
    description: Deletes a saved payment method by ID.
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        description: UUID of the payment method
        schema: { type: string, format: uuid, example: 'a1b2c3d4-e5f6-7890-abcd-ef1234567890' }
    responses:
      '200':
        description: Payment method removed successfully
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SuccessResponse' }
      '400':
        description: Validation error (id must be a valid UUID)
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '404':
        description: Payment method not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

/users/me/payment-methods/{id}/default:
  patch:
    tags: [Users]
    summary: Set payment method as default
    description: Marks the specified payment method as the user's default.
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        description: UUID of the payment method
        schema: { type: string, format: uuid, example: 'a1b2c3d4-e5f6-7890-abcd-ef1234567890' }
    responses:
      '200':
        description: Default payment method updated successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data: { $ref: '#/components/schemas/PaymentMethod' }
      '400':
        description: Validation error (id must be a valid UUID)
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '404':
        description: Payment method not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

# ════════════════════════════════════════════════════════════════════════════
# ADMIN ROUTES  —  prefix: /api/v1/admin/users
# ════════════════════════════════════════════════════════════════════════════

/admin/users:
  get:
    tags: [Users]
    summary: List all users
    description: Returns a paginated, filterable, and searchable list of all users. Admin only.
    security: [{ BearerAuth: [] }]
    parameters:
      - name: page
        in: query
        schema: { type: integer, minimum: 1, example: 1 }
        description: Page number (must be > 0)
      - name: limit
        in: query
        schema: { type: integer, minimum: 1, maximum: 100, example: 20 }
        description: Results per page (1–100)
      - name: sortBy
        in: query
        schema:
          type: string
          enum: [createdAt, updatedAt, name, email]
          example: createdAt
        description: Field to sort by
      - name: sortOrder
        in: query
        schema:
          type: string
          enum: [asc, desc]
          example: desc
        description: Sort direction
      - name: search
        in: query
        schema: { type: string, minLength: 1, maxLength: 100, example: 'ahmed' }
        description: Search by name, email, or phone
      - name: status
        in: query
        schema:
          type: string
          enum: [all, active, suspended, verified, unverified]
          example: active
        description: Filter by account status
      - name: dateFrom
        in: query
        schema: { type: string, format: date-time, example: '2024-01-01T00:00:00Z' }
        description: Filter users created after this date (ISO 8601)
      - name: dateTo
        in: query
        schema: { type: string, format: date-time, example: '2024-12-31T23:59:59Z' }
        description: Filter users created before this date (ISO 8601)
    responses:
      '200':
        description: Users list retrieved successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data:
                      type: array
                      items: { $ref: '#/components/schemas/User' }
                    pagination: { $ref: '#/components/schemas/Pagination' }
      '400':
        description: Validation error in query params
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '403':
        description: Forbidden — admin role required
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

  post:
    tags: [Users]
    summary: Create a new user
    description: Admin creates a new passenger account directly.
    security: [{ BearerAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [name, email]
            properties:
              name:
                type: string
                example: Sara Mohamed
              email:
                type: string
                format: email
                example: sara@example.com
              phone:
                type: string
                example: '+201098765432'
              password:
                type: string
                minLength: 8
                example: 'Str0ngPass!'
                description: If omitted, a random password may be generated.
              language:
                type: string
                enum: [en, ar]
                example: ar
    responses:
      '201':
        description: User created successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data: { $ref: '#/components/schemas/User' }
      '400':
        description: Validation error
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '403':
        description: Forbidden — admin role required
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '409':
        description: Email already in use
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

/admin/users/{userId}:
  get:
    tags: [Users]
    summary: Get user by ID
    description: Returns detailed information about a specific user. Admin only.
    security: [{ BearerAuth: [] }]
    parameters:
      - name: userId
        in: path
        required: true
        description: UUID of the user
        schema: { type: string, format: uuid, example: 'a1b2c3d4-e5f6-7890-abcd-ef1234567890' }
    responses:
      '200':
        description: User details retrieved successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data: { $ref: '#/components/schemas/User' }
      '400':
        description: Validation error (userId must be a valid UUID)
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '403':
        description: Forbidden — admin role required
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '404':
        description: User not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

  put:
    tags: [Users]
    summary: Update user information
    description: Admin updates one or more profile fields for a specific user.
    security: [{ BearerAuth: [] }]
    parameters:
      - name: userId
        in: path
        required: true
        description: UUID of the user
        schema: { type: string, format: uuid, example: 'a1b2c3d4-e5f6-7890-abcd-ef1234567890' }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
                minLength: 2
                maxLength: 100
                example: Ahmed Karim
              email:
                type: string
                format: email
                example: ahmed@example.com
              phone:
                type: string
                example: '+201012345678'
              language:
                type: string
                enum: [en, ar]
                example: en
              notificationsEnabled:
                type: boolean
                example: true
    responses:
      '200':
        description: User updated successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data: { $ref: '#/components/schemas/User' }
      '400':
        description: Validation error
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '403':
        description: Forbidden — admin role required
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '404':
        description: User not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

  delete:
    tags: [Users]
    summary: Delete a user account
    description: |
      Permanently deletes a user account. **Irreversible.**
      Requires `confirm=true` as a query parameter to prevent accidental deletion.
    security: [{ BearerAuth: [] }]
    parameters:
      - name: userId
        in: path
        required: true
        description: UUID of the user
        schema: { type: string, format: uuid, example: 'a1b2c3d4-e5f6-7890-abcd-ef1234567890' }
      - name: confirm
        in: query
        required: true
        description: Must be `true` to confirm permanent deletion
        schema: { type: string, enum: ['true'], example: 'true' }
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              reason:
                type: string
                minLength: 5
                maxLength: 500
                example: 'User violated terms of service.'
    responses:
      '200':
        description: User deleted successfully
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SuccessResponse' }
      '400':
        description: Validation error or missing confirm=true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '403':
        description: Forbidden — admin role required
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '404':
        description: User not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

/admin/users:
  get:
    tags: [Users]
    summary: List users (admin)
    security: [{ BearerAuth: [] }]
    parameters:
      - name: page
        in: query
        schema: { type: integer, default: 1 }
      - name: per_page
        in: query
        schema: { type: integer, default: 20 }
      - name: q
        in: query
        schema: { type: string, description: Search by name, email or phone }
    responses:
      '200':
        description: Users list
        content:
          application/json:
            schema:
              properties:
                data:
                  type: array
                  items: { $ref: '#/components/schemas/User' }
                pagination: { $ref: '#/components/schemas/Pagination' }
  post:
    tags: [Users]
    summary: Create a new user (admin)
    security: [{ BearerAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UserCreate'
    responses:
      '201':
        description: User created
        content:
          application/json:
            schema:
              properties:
                data: { $ref: '#/components/schemas/User' }

/admin/users/{id}:
  get:
    tags: [Admin]
    summary: Get user details (admin)
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: User details
        content:
          application/json:
            schema:
              properties:
                data: { $ref: '#/components/schemas/User' }
  patch:
    tags: [Admin]
    summary: Update user (suspend/activate)
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      content:
        application/json:
          schema:
            properties:
              isSuspended: { type: boolean }
              notes:       { type: string }
    responses:
      '200': { description: User updated }
  put:
    tags: [Admin]
    summary: Replace/Update user (admin)
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UserUpdate'
    responses:
      '200':
        description: User updated
        content:
          application/json:
            schema:
              properties:
                data: { $ref: '#/components/schemas/User' }
  delete:
    tags: [Admin]
    summary: Delete user (admin)
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: confirm
        in: query
        required: true
        schema: { type: string }
        description: Must be 'true' to confirm deletion
    responses:
      '200': { description: User deleted }

/admin/users/{userId}/suspend:
  post:
    tags: [Users]
    summary: Suspend or unsuspend a user
    description: |
      Toggles the suspension status of a user account.
      Use `action: "suspend"` to suspend and `action: "unsuspend"` to lift a suspension.
      This is the single canonical route for suspension management.
    security: [{ BearerAuth: [] }]
    parameters:
      - name: userId
        in: path
        required: true
        description: UUID of the user
        schema: { type: string, format: uuid, example: 'a1b2c3d4-e5f6-7890-abcd-ef1234567890' }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [action]
            properties:
              action:
                type: string
                enum: [suspend, unsuspend]
                example: suspend
              reason:
                type: string
                minLength: 5
                maxLength: 500
                example: 'Repeated fraudulent trip cancellations.'
              durationDays:
                type: integer
                minimum: 1
                maximum: 365
                example: 7
                description: Optional suspension duration in days. If omitted, suspension is indefinite.
    responses:
      '200':
        description: Suspension status updated successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data: { $ref: '#/components/schemas/User' }
      '400':
        description: Validation error
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '403':
        description: Forbidden — admin role required
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '404':
        description: User not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

/admin/users/{userId}/refund:
  post:
    tags: [Users]
    summary: Issue a refund to user wallet
    description: Credits a refund amount directly to the user's in-app wallet. Optionally linked to a trip.
    security: [{ BearerAuth: [] }]
    parameters:
      - name: userId
        in: path
        required: true
        description: UUID of the user
        schema: { type: string, format: uuid, example: 'a1b2c3d4-e5f6-7890-abcd-ef1234567890' }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [amount, currency, reason]
            properties:
              amount:
                type: number
                format: float
                minimum: 0.01
                example: 25.50
                description: Refund amount (must be > 0)
              currency:
                type: string
                minLength: 3
                maxLength: 3
                example: EGP
                description: ISO 4217 currency code (3 characters, uppercased automatically)
              tripId:
                type: string
                format: uuid
                example: 'b2c3d4e5-f6a7-8901-bcde-f12345678901'
                description: Optional trip UUID this refund is associated with
              reason:
                type: string
                minLength: 5
                maxLength: 200
                example: 'Overcharged due to GPS error.'
              notes:
                type: string
                maxLength: 500
                example: 'Confirmed by support agent #1042.'
    responses:
      '200':
        description: Refund issued successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data: { $ref: '#/components/schemas/Wallet' }
      '400':
        description: Validation error
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '403':
        description: Forbidden — admin role required
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '404':
        description: User not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

/admin/users/{userId}/reset-password:
  post:
    tags: [Users]
    summary: Reset user password
    description: Admin sets a new password for a specific user account.
    security: [{ BearerAuth: [] }]
    parameters:
      - name: userId
        in: path
        required: true
        description: UUID of the user
        schema: { type: string, format: uuid, example: 'a1b2c3d4-e5f6-7890-abcd-ef1234567890' }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [newPassword]
            properties:
              newPassword:
                type: string
                minLength: 8
                example: 'NewStr0ng#Pass'
                description: New password (minimum 8 characters)
    responses:
      '200':
        description: Password reset successfully
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SuccessResponse' }
      '400':
        description: Validation error (password too short)
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '403':
        description: Forbidden — admin role required
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '404':
        description: User not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

