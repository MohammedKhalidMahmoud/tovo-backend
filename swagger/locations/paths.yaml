/locations/search:
  get:
    tags: [Locations]
    summary: Autocomplete location search
    security: [{ BearerAuth: [] }]
    parameters:
      - { name: q,     in: query, required: true,  schema: { type: string } }
      - { name: lat,   in: query, required: false, schema: { type: number } }
      - { name: lng,   in: query, required: false, schema: { type: number } }
      - { name: limit, in: query, required: false, schema: { type: integer, default: 10 } }
    responses:
      '200': { description: Location suggestions }

/locations/nearby-captains:
  get:
    tags: [Locations]
    summary: Get nearby available captains
    security: [{ BearerAuth: [] }]
    parameters:
      - { name: latitude,  in: query, required: true,  schema: { type: number }, description: Pickup latitude }
      - { name: longitude, in: query, required: true,  schema: { type: number }, description: Pickup longitude }
      - { name: radius,    in: query, required: false, schema: { type: number, default: 5 }, description: Search radius in km (default 5) }
      - { name: serviceId, in: query, required: false, schema: { type: string, format: uuid }, description: Filter captains by service category }
    responses:
      '200':
        description: Nearby captains matching location and service
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        type: object
                        properties:
                          id: { type: string, format: uuid }

/locations/reverse-geocode:
  post:
    tags: [Locations]
    summary: Convert coordinates to address
    security: [{ BearerAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            required: [lat, lng]
            properties:
              lat: { type: number }
              lng: { type: number }
    responses:
      '200': { description: Address string }
