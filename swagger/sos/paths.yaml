/sos:
  post:
    tags: [SOS]
    summary: Trigger an SOS alert
    description: Authenticated users or captains send an emergency alert with optional location and message.
    security: [{ BearerAuth: [] }]
    requestBody:
      required: false
      content:
        application/json:
          schema:
            type: object
            properties:
              lat:     { type: number, example: 30.0444 }
              lng:     { type: number, example: 31.2357 }
              message: { type: string, example: I need help urgently }
    responses:
      '201':
        description: SOS alert created
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data: { $ref: '#/components/schemas/SosAlert' }
      '401': { description: Unauthorized }

/admin/sos:
  get:
    tags: [SOS]
    summary: List SOS alerts (admin)
    security: [{ BearerAuth: [] }]
    parameters:
      - name: status
        in: query
        schema: { type: string, enum: [pending, handled] }
      - name: page
        in: query
        schema: { type: integer, default: 1 }
      - name: limit
        in: query
        schema: { type: integer, default: 20 }
    responses:
      '200':
        description: Paginated SOS alert list
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data:
                      type: array
                      items: { $ref: '#/components/schemas/SosAlert' }

/admin/sos/{id}:
  get:
    tags: [SOS]
    summary: Get a single SOS alert
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: SOS alert details
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data: { $ref: '#/components/schemas/SosAlert' }
      '404': { description: SOS alert not found }

/admin/sos/{id}/handle:
  post:
    tags: [SOS]
    summary: Mark SOS alert as handled
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: Alert marked as handled
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data: { $ref: '#/components/schemas/SosAlert' }
      '404': { description: SOS alert not found }
