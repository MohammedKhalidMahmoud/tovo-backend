SosAlert:
  type: object
  properties:
    id:         { type: string, format: uuid }
    status:     { type: string, enum: [pending, handled], example: pending }
    lat:        { type: number, nullable: true, example: 30.0444 }
    lng:        { type: number, nullable: true, example: 31.2357 }
    message:    { type: string, nullable: true }
    resolvedAt: { type: string, format: date-time, nullable: true }
    createdAt:  { type: string, format: date-time }
    user:
      nullable: true
      type: object
      properties:
        name:  { type: string }
        email: { type: string, format: email }
        phone: { type: string }
    captain:
      nullable: true
      type: object
      properties:
        name:  { type: string }
        email: { type: string, format: email }
        phone: { type: string }
