Faq:
  type: object
  properties:
    id:        { type: string, format: uuid }
    question:  { type: string }
    answer:    { type: string }
    order:     { type: integer, example: 0 }
    isActive:  { type: boolean, example: true }
    createdAt: { type: string, format: date-time }
    updatedAt: { type: string, format: date-time }
