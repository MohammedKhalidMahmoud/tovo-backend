/instructions:
  get:
    tags: [Instructions]
    summary: List active instructions
    security: []
    parameters:
      - name: serviceId
        in: query
        required: false
        description: Filter active instructions by service.
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: Active instruction list
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data:
                      type: array
                      items: { $ref: '#/components/schemas/Instruction' }
      '400': { description: Validation error }
      '404': { description: Service not found }

/instructions/service/{serviceId}:
  get:
    tags: [Instructions]
    summary: List active instructions for a service
    security: []
    parameters:
      - name: serviceId
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: Active instruction list for service
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data:
                      type: array
                      items: { $ref: '#/components/schemas/Instruction' }
      '400': { description: Validation error }
      '404': { description: Service not found }

/instructions/{id}:
  get:
    tags: [Instructions]
    summary: Get an active instruction by ID
    security: []
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: Instruction retrieved
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data: { $ref: '#/components/schemas/Instruction' }
      '400': { description: Validation error }
      '404': { description: Instruction not found }
