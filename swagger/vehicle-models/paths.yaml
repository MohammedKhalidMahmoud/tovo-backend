/vehicle-models:
  get:
    tags: [Vehicle Models]
    summary: List active vehicle models
    security: []
    responses:
      '200':
        description: Active vehicle models
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data:
                      type: array
                      items: { $ref: '#/components/schemas/VehicleModel' }

/vehicle-models/{id}:
  get:
    tags: [Vehicle Models]
    summary: Get active vehicle model by ID
    security: []
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: Vehicle model details
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data: { $ref: '#/components/schemas/VehicleModel' }
      '400': { description: Validation error }
      '404': { description: Vehicle model not found }

/admin/vehicle-models:
  get:
    tags: [Vehicle Models]
    summary: List all vehicle models (admin)
    security: [{ BearerAuth: [] }]
    responses:
      '200':
        description: Vehicle models list
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data:
                      type: array
                      items: { $ref: '#/components/schemas/VehicleModel' }
      '401': { description: Unauthorized }
      '403': { description: Forbidden }

  post:
    tags: [Vehicle Models]
    summary: Create vehicle model (admin)
    security: [{ BearerAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [name, brand, serviceId]
            properties:
              name: { type: string }
              brand: { type: string }
              serviceId: { type: string, format: uuid }
              isActive: { type: boolean }
    responses:
      '201': { description: Vehicle model created }
      '400': { description: Validation error }
      '401': { description: Unauthorized }
      '403': { description: Forbidden }

/admin/vehicle-models/{id}:
  get:
    tags: [Vehicle Models]
    summary: Get vehicle model by ID (admin)
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200': { description: Vehicle model details }
      '401': { description: Unauthorized }
      '403': { description: Forbidden }
      '404': { description: Vehicle model not found }

  put:
    tags: [Vehicle Models]
    summary: Update vehicle model (admin)
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              name: { type: string }
              brand: { type: string }
              serviceId: { type: string, format: uuid }
              isActive: { type: boolean }
    responses:
      '200': { description: Vehicle model updated }
      '400': { description: Validation error }
      '401': { description: Unauthorized }
      '403': { description: Forbidden }
      '404': { description: Vehicle model not found }

  delete:
    tags: [Vehicle Models]
    summary: Delete vehicle model (admin)
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: confirm
        in: query
        required: true
        schema: { type: string, enum: ['true'] }
    responses:
      '200': { description: Vehicle model deleted }
      '400': { description: Validation error }
      '401': { description: Unauthorized }
      '403': { description: Forbidden }
      '404': { description: Vehicle model not found }
