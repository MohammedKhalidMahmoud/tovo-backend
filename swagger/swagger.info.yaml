openapi: "3.0.3"

info:
  title: Tovo Ride-Hailing API
  version: "1.0.0"
  description: |
    Complete REST API documentation for the Tovo ride-hailing platform.

    ## Authentication
    Protected endpoints require:
    Authorization: bearer <JWT>

servers:
  - url: http://localhost:3000/api/v1
    description: Local Development Server
  - url: https://tovo-b.nodeteam.site/api/v1
    description: Production Server

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - BearerAuth: []

