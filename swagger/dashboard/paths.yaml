/dashboard/statistics:
  get:
    tags: [Dashboard]
    summary: Dashboard statistics (admin)
    security: [{ BearerAuth: [] }]
    responses:
      '200':
        description: Dashboard summary
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean }
                message: { type: string }
                data:
                  type: object
                  properties:
                    totalRiders: { type: integer }
                    totalDrivers: { type: integer }
                    totalFleets: { type: integer }
                    totalRides: { type: integer }
                    completedRides: { type: integer }
                    pendingRides: { type: integer }
                    cancelledRides: { type: integer }
                    totalRevenue: { type: number }
                    todayRevenue: { type: number }
                    monthlyRevenue: { type: number }
                    activeDrivers: { type: integer }
                    activeRiders: { type: integer }
                    totalCommission: { type: number }
                    todayCommission: { type: number }
      '401': { description: Unauthorized }
      '403': { description: Forbidden }

/dashboard/admin-dashboard:
  get:
    tags: [Dashboard]
    summary: Dashboard statistics alias (admin)
    security: [{ BearerAuth: [] }]
    responses:
      '200': { description: Dashboard summary }
      '401': { description: Unauthorized }
      '403': { description: Forbidden }

/dashboard/ride-requests:
  get:
    tags: [Dashboard]
    summary: List ride requests for dashboard
    security: []
    parameters:
      - name: page
        in: query
        schema: { type: integer, default: 1 }
      - name: per_page
        in: query
        schema: { type: integer, default: 20 }
      - name: limit
        in: query
        schema: { type: integer }
      - name: status
        in: query
        schema: { type: string }
      - name: userId
        in: query
        schema: { type: string, format: uuid }
      - name: driverId
        in: query
        schema: { type: string, format: uuid }
      - name: isSchedule
        in: query
        schema: { type: boolean }
    responses:
      '200':
        description: Ride requests
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean }
                message: { type: string }
                data:
                  type: array
                  items: { $ref: '#/components/schemas/Trip' }
                pagination: { $ref: '#/components/schemas/Pagination' }
      '400': { description: Validation error }

/dashboard/ride-requests/riderequest-list:
  get:
    tags: [Dashboard]
    summary: Ride requests alias
    security: []
    parameters:
      - name: page
        in: query
        schema: { type: integer, default: 1 }
      - name: per_page
        in: query
        schema: { type: integer, default: 20 }
      - name: limit
        in: query
        schema: { type: integer }
      - name: status
        in: query
        schema: { type: string }
      - name: userId
        in: query
        schema: { type: string, format: uuid }
      - name: driverId
        in: query
        schema: { type: string, format: uuid }
      - name: isSchedule
        in: query
        schema: { type: boolean }
    responses:
      '200': { description: Ride requests }
      '400': { description: Validation error }

/dashboard/rides/upcoming:
  get:
    tags: [Dashboard]
    summary: List upcoming rides
    security: []
    parameters:
      - name: limit
        in: query
        schema: { type: integer, default: 10 }
      - name: all
        in: query
        schema: { type: boolean }
    responses:
      '200':
        description: Upcoming rides
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean }
                message: { type: string }
                data:
                  type: array
                  items: { $ref: '#/components/schemas/Trip' }
      '400': { description: Validation error }
