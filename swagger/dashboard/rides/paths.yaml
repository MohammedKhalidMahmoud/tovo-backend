/admin/rides:
  get:
    tags: [AdminTrips]
    summary: List rides/trips (admin)
    security: [{ BearerAuth: [] }]
    parameters:
      - name: page
        in: query
        schema: { type: integer, default: 1 }
      - name: per_page
        in: query
        schema: { type: integer, default: 20 }
      - name: status
        in: query
        schema: { type: string }
      - name: q
        in: query
        schema: { type: string }
    responses:
      '200':
        description: Rides list
        content:
          application/json:
            schema:
              properties:
                data:
                  type: array
                  items: { $ref: '#/components/schemas/Trip' }
                pagination: { $ref: '#/components/schemas/Pagination' }
  post:
    tags: [AdminTrips]
    summary: Create a ride (admin)
    security: [{ BearerAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RideCreate'
    responses:
      '201':
        description: Ride created
        content:
          application/json:
            schema:
              properties:
                data: { $ref: '#/components/schemas/Trip' }
  put:
    tags: [AdminTrips]
    summary: Bulk update rides (admin)
    security: [{ BearerAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              ids:
                type: array
                items: { type: string, format: uuid }
              status: { type: string }
    responses:
      '200': { description: Rides updated }
  delete:
    tags: [AdminTrips]
    summary: Bulk delete rides (admin)
    security: [{ BearerAuth: [] }]
    parameters:
      - name: confirm
        in: query
        required: true
        schema: { type: string }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              ids:
                type: array
                items: { type: string, format: uuid }
    responses:
      '200': { description: Rides deleted }

/admin/rides/{id}:
  get:
    tags: [AdminTrips]
    summary: Get ride details (admin)
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: Ride details
        content:
          application/json:
            schema:
              properties:
                data: { $ref: '#/components/schemas/Trip' }

/admin/rides/{id}/refund:
  post:
    tags: [AdminTrips]
    summary: Issue a refund for a trip
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RefundRequest'
    responses:
      '200': { description: Refund processed }

/admin/rides/{id}/reassign:
  post:
    tags: [AdminTrips]
    summary: Reassign ride to another driver
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            required: [driverId]
            properties:
              driverId: { type: string, format: uuid }
    responses:
      '200': { description: Ride reassigned }
