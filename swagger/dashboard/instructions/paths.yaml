/admin/instructions:
  get:
    tags: [Admin Instructions]
    summary: List all instructions (admin)
    security: [{ BearerAuth: [] }]
    parameters:
      - name: page
        in: query
        schema: { type: integer, default: 1 }
      - name: limit
        in: query
        schema: { type: integer, default: 20 }
      - name: isActive
        in: query
        schema: { type: boolean }
      - name: search
        in: query
        description: Search by title or description
        schema: { type: string }
      - name: serviceId
        in: query
        description: Filter instructions linked to a service
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: Instruction list
        headers:
          X-Total-Count: { schema: { type: integer } }
          X-Total-Pages: { schema: { type: integer } }
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data:
                      type: array
                      items: { $ref: '#/components/schemas/Instruction' }
      '401': { description: Unauthorized }
      '403': { description: Forbidden }
  post:
    tags: [Admin Instructions]
    summary: Create an instruction (admin)
    security: [{ BearerAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [title, description]
            properties:
              title: { type: string }
              description: { type: string }
              order: { type: integer, minimum: 0, default: 0 }
              isActive: { type: boolean, default: true }
              serviceIds:
                type: array
                items: { type: string, format: uuid }
    responses:
      '201':
        description: Instruction created
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data: { $ref: '#/components/schemas/Instruction' }
      '400': { description: Validation error }
      '401': { description: Unauthorized }
      '403': { description: Forbidden }

/admin/instructions/service/{serviceId}:
  get:
    tags: [Admin Instructions]
    summary: List active instructions for a service (admin)
    security: [{ BearerAuth: [] }]
    parameters:
      - name: serviceId
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: Active instruction list for service
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data:
                      type: array
                      items: { $ref: '#/components/schemas/Instruction' }
      '401': { description: Unauthorized }
      '403': { description: Forbidden }
      '404': { description: Service not found }

/admin/instructions/{id}:
  get:
    tags: [Admin Instructions]
    summary: Get an instruction by ID (admin)
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: Instruction retrieved
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data: { $ref: '#/components/schemas/Instruction' }
      '401': { description: Unauthorized }
      '403': { description: Forbidden }
      '404': { description: Instruction not found }
  put:
    tags: [Admin Instructions]
    summary: Update an instruction (admin)
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              title: { type: string }
              description: { type: string }
              order: { type: integer, minimum: 0 }
              isActive: { type: boolean }
              serviceIds:
                type: array
                items: { type: string, format: uuid }
    responses:
      '200': { description: Instruction updated }
      '400': { description: Validation error }
      '401': { description: Unauthorized }
      '403': { description: Forbidden }
      '404': { description: Instruction not found }
  patch:
    tags: [Admin Instructions]
    summary: Partially update an instruction (admin)
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              title: { type: string }
              description: { type: string }
              order: { type: integer, minimum: 0 }
              isActive: { type: boolean }
              serviceIds:
                type: array
                items: { type: string, format: uuid }
    responses:
      '200': { description: Instruction updated }
      '400': { description: Validation error }
      '401': { description: Unauthorized }
      '403': { description: Forbidden }
      '404': { description: Instruction not found }
  delete:
    tags: [Admin Instructions]
    summary: Delete an instruction (admin)
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200': { description: Instruction deleted }
      '401': { description: Unauthorized }
      '403': { description: Forbidden }
      '404': { description: Instruction not found }

/admin/instructions/{id}/services:
  get:
    tags: [Admin Instructions]
    summary: List services linked to an instruction
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: Linked services
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data:
                      type: array
                      items: { $ref: '#/components/schemas/Service' }
  post:
    tags: [Admin Instructions]
    summary: Link a service to an instruction
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [serviceId]
            properties:
              serviceId: { type: string, format: uuid }
    responses:
      '200': { description: Service linked }
      '400': { description: Validation error or duplicate link }
      '401': { description: Unauthorized }
      '403': { description: Forbidden }
      '404': { description: Instruction or service not found }

/admin/instructions/{id}/services/{serviceId}:
  delete:
    tags: [Admin Instructions]
    summary: Unlink a service from an instruction
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: serviceId
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200': { description: Service unlinked }
      '401': { description: Unauthorized }
      '403': { description: Forbidden }
      '404': { description: Instruction, service, or link not found }
