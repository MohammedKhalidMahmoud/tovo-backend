/notifications:
  get:
    tags: [Admin Notifications]
    summary: List notifications for authenticated user
    security: [{ BearerAuth: [] }]
    parameters:
      - name: page
        in: query
        schema: { type: integer, default: 1 }
      - name: per_page
        in: query
        schema: { type: integer, default: 20 }
    responses:
      '200':
        description: Notifications list
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data:
                      type: array
                      items: { $ref: '#/components/schemas/Notification' }
      '401': { description: Unauthorized }

/notifications/{id}/read:
  patch:
    tags: [Admin Notifications]
    summary: Mark a notification as read
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200': { description: Marked as read }
      '400': { description: Validation error }
      '401': { description: Unauthorized }

/notifications/read-all:
  patch:
    tags: [Admin Notifications]
    summary: Mark all notifications as read
    security: [{ BearerAuth: [] }]
    responses:
      '200': { description: All marked as read }
      '401': { description: Unauthorized }

/notifications/device-token:
  post:
    tags: [Admin Notifications]
    summary: Register push device token
    security: [{ BearerAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [token, platform]
            properties:
              token: { type: string }
              platform: { type: string, enum: [ios, android, web] }
    responses:
      '200': { description: Device token registered }
      '400': { description: Validation error }
      '401': { description: Unauthorized }

/notifications/send-to-user:
  post:
    tags: [Admin Notifications]
    summary: Send push notification to user (admin)
    security: [{ BearerAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [user_id, title, body]
            properties:
              user_id: { type: string, format: uuid }
              title: { type: string }
              body: { type: string }
              data: { type: object }
    responses:
      '200': { description: Notification sent }
      '400': { description: Validation error }
      '401': { description: Unauthorized }
      '403': { description: Forbidden }

/notifications/send-to-driver:
  post:
    tags: [Admin Notifications]
    summary: Send push notification to driver (admin)
    security: [{ BearerAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [driver_id, title, body]
            properties:
              driver_id: { type: string, format: uuid }
              title: { type: string }
              body: { type: string }
              data: { type: object }
    responses:
      '200': { description: Notification sent }
      '400': { description: Validation error }
      '401': { description: Unauthorized }
      '403': { description: Forbidden }

/notifications/send-to-audience:
  post:
    tags: [Admin Notifications]
    summary: Broadcast notification to audience (admin)
    security: [{ BearerAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [audience, title, body]
            properties:
              audience: { type: string, enum: [drivers, riders, all] }
              title: { type: string }
              body: { type: string }
              data: { type: object }
    responses:
      '200': { description: Notifications sent }
      '400': { description: Validation error }
      '401': { description: Unauthorized }
      '403': { description: Forbidden }
