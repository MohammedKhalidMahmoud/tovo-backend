/trips/estimate:
  get:
    tags: [AdminTrips]
    summary: Estimate trip fares
    security: []
    parameters:
      - name: lat_pick
        in: query
        required: true
        schema: { type: number, format: float }
      - name: lng_pick
        in: query
        required: true
        schema: { type: number, format: float }
      - name: lat_drop
        in: query
        required: true
        schema: { type: number, format: float }
      - name: lng_drop
        in: query
        required: true
        schema: { type: number, format: float }
      - name: stops
        in: query
        required: false
        description: JSON stringified array of stops, each with lat, lng, and address
        schema: { type: string }
    responses:
      '200':
        description: Fare estimates
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        type: object
                        properties:
                          serviceId: { type: string, format: uuid }
                          serviceName: { type: string }
                          distanceKm: { type: number }
                          chargeableDistanceKm: { type: number }
                          baseFareAmount: { type: number }
                          perKmRate: { type: number }
                          minimumDistanceKm: { type: number }
                          distanceFareAmount: { type: number }
                          perStopCharge: { type: number }
                          stopsCount: { type: integer }
                          stopsFareAmount: { type: number }
                          tollGateAmount: { type: number }
                          tollGatesCount: { type: integer }
                          originalFare: { type: number }
                          finalFare: { type: number }
                          discountAmount: { type: number }
                          commission: { type: number }
                          driverEarnings: { type: number }
                          routeDistanceMeters: { type: integer, nullable: true }
                          routeDurationSeconds: { type: integer, nullable: true }
                          currency: { type: string, example: EGP }
      '400': { description: Validation error }

/trips/regions/active:
  get:
    tags: [AdminTrips]
    summary: List active service regions
    security: []
    responses:
      '200':
        description: Active regions
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        type: object
                        properties:
                          id: { type: string, format: uuid }
                          name: { type: string }
                          city: { type: string, nullable: true }
                          lat: { type: number, nullable: true }
                          lng: { type: number, nullable: true }
                          radius: { type: number, nullable: true }
                          status: { type: boolean }

/trips:
  post:
    tags: [AdminTrips]
    summary: Create a trip request
    security: [{ BearerAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [pickup_lat, pickup_lng, pickup_address, dropoff_lat, dropoff_lng, dropoff_address, service_id]
            properties:
              pickup_lat: { type: number }
              pickup_lng: { type: number }
              pickup_address: { type: string }
              dropoff_lat: { type: number }
              dropoff_lng: { type: number }
              dropoff_address: { type: string }
              service_id: { type: string, format: uuid }
              payment_type:
                type: string
                enum: [cash]
                description: Optional; only `cash` is accepted
              stops:
                type: array
                items:
                  type: object
                  required: [lat, lng, address]
                  properties:
                    lat: { type: number }
                    lng: { type: number }
                    address: { type: string }
    responses:
      '201':
        description: Trip created
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data: { $ref: '#/components/schemas/Trip' }
      '400': { description: Validation error }
      '401': { description: Unauthorized }
      '422': { description: Invalid pickup region }

  get:
    tags: [AdminTrips]
    summary: List customer trips
    security: [{ BearerAuth: [] }]
    parameters:
      - name: page
        in: query
        schema: { type: integer, default: 1 }
      - name: per_page
        in: query
        schema: { type: integer, default: 20 }
    responses:
      '200': { description: Customer trips }
      '401': { description: Unauthorized }

/trips/nearby-drivers:
  get:
    tags: [AdminTrips]
    summary: Get nearby online drivers
    security: [{ BearerAuth: [] }]
    parameters:
      - name: latitude
        in: query
        required: true
        schema: { type: number }
      - name: longitude
        in: query
        required: true
        schema: { type: number }
      - name: radius
        in: query
        schema: { type: number, default: 5 }
      - name: serviceId
        in: query
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: Nearby drivers list
        content:
          application/json:
            example:
              success: true
              message: Success
              data:
                - id: 7c7ca710-66cc-4a08-b9fc-f735818cef3f
                  latitude: 30.064088
                  longitude: 31.264473
                  heading: 120
