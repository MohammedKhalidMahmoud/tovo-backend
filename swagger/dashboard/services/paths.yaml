
/admin/services:
  get:
    tags: [Admin Services]
    summary: List all services (admin)
    security: [{ BearerAuth: [] }]
    responses:
      '200':
        description: Services list
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data:
                      type: array
                      items: { $ref: '#/components/schemas/Service' }
      '401': { description: Unauthorized }
      '403': { description: Forbidden }

  post:
    tags: [Admin Services]
    summary: Create service (admin)
    security: [{ BearerAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [name]
            properties:
              name: { type: string }
              baseFare: { type: number, minimum: 0 }
              perKmRate: { type: number, minimum: 0 }
              minimumDistanceKm: { type: number, minimum: 0 }
              perStopCharge: { type: number, minimum: 0 }
              requiresSenderCode: { type: boolean, nullable: true }
              requiresReceiverCode: { type: boolean, nullable: true }
              maxWeightKg: { type: number, minimum: 0, nullable: true }
              isActive: { type: boolean }
    responses:
      '201': { description: Service created }
      '400': { description: Validation error }
      '401': { description: Unauthorized }
      '403': { description: Forbidden }

/admin/services/{id}:
  get:
    tags: [Admin Services]
    summary: Get service by ID (admin)
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200': { description: Service details }
      '401': { description: Unauthorized }
      '403': { description: Forbidden }
      '404': { description: Service not found }

  patch:
    tags: [Admin Services]
    summary: Update service (admin)
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              name: { type: string }
              baseFare: { type: number, minimum: 0 }
              perKmRate: { type: number, minimum: 0 }
              minimumDistanceKm: { type: number, minimum: 0 }
              perStopCharge: { type: number, minimum: 0 }
              requiresSenderCode: { type: boolean, nullable: true }
              requiresReceiverCode: { type: boolean, nullable: true }
              maxWeightKg: { type: number, minimum: 0, nullable: true }
              isActive: { type: boolean }
    responses:
      '200': { description: Service updated }
      '400': { description: Validation error }
      '401': { description: Unauthorized }
      '403': { description: Forbidden }
      '404': { description: Service not found }

  delete:
    tags: [Admin Services]
    summary: Delete service (admin)
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200': { description: Service deleted }
      '401': { description: Unauthorized }
      '403': { description: Forbidden }
      '404': { description: Service not found }

/admin/services/{id}/image:
  patch:
    tags: [Admin Services]
    summary: Update service image (admin)
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required: [image]
            properties:
              image: { type: string, format: binary }
    responses:
      '200': { description: Image updated }
      '400': { description: Validation error or no file }
      '401': { description: Unauthorized }
      '403': { description: Forbidden }
      '404': { description: Service not found }
