
/admin/payments:
  get:
    tags: [Admin Payments]
    summary: List all completed payments (admin)
    security: [{ BearerAuth: [] }]
    parameters:
      - name: page
        in: query
        schema: { type: integer, default: 1 }
      - name: limit
        in: query
        schema: { type: integer, default: 20 }
      - name: status
        in: query
        schema: { type: string }
      - name: userId
        in: query
        schema: { type: string, format: uuid }
      - name: driverId
        in: query
        schema: { type: string, format: uuid }
      - name: paymentType
        in: query
        schema: { type: string, enum: [cash] }
      - name: dateFrom
        in: query
        schema: { type: string, format: date-time }
      - name: dateTo
        in: query
        schema: { type: string, format: date-time }
    responses:
      '200':
        description: Payments list
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data:
                      type: array
                      items: { $ref: '#/components/schemas/Payment' }
      '401': { description: Unauthorized }
      '403': { description: Forbidden }
