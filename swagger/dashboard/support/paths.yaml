
/admin/support:
  get:
    tags: [Admin Support]
    summary: List all support tickets (admin)
    security: [{ BearerAuth: [] }]
    parameters:
      - name: page
        in: query
        schema: { type: integer, default: 1 }
      - name: limit
        in: query
        schema: { type: integer, default: 20 }
      - name: status
        in: query
        schema: { type: string }
      - name: type
        in: query
        schema: { type: string }
      - name: search
        in: query
        schema: { type: string }
      - name: tripId
        in: query
        schema: { type: string, format: uuid }
    responses:
      '200': { description: Ticket list }
      '401': { description: Unauthorized }
      '403': { description: Forbidden }

/admin/support/{id}:
  get:
    tags: [Admin Support]
    summary: Get support ticket by ID (admin)
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200': { description: Ticket details }
      '401': { description: Unauthorized }
      '403': { description: Forbidden }
      '404': { description: Ticket not found }

/admin/support/{id}/respond:
  post:
    tags: [Admin Support]
    summary: Respond to support ticket (admin)
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [response]
            properties:
              response: { type: string }
    responses:
      '200': { description: Response submitted }
      '400': { description: Validation error }
      '401': { description: Unauthorized }
      '403': { description: Forbidden }

/admin/support/{id}/resolve:
  patch:
    tags: [Admin Support]
    summary: Resolve support ticket (admin)
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200': { description: Ticket resolved }
      '400': { description: Validation error }
      '401': { description: Unauthorized }
      '403': { description: Forbidden }
