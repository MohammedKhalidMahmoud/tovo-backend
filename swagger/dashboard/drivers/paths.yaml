
# ════════════════════════════════════════════════════════════════════════════
# ADMIN ROUTES  —  prefix: /api/v1/admin/drivers
# ════════════════════════════════════════════════════════════════════════════

/admin/drivers:
  get:
    tags: [Admin Drivers]
    summary: List all drivers
    description: Returns a paginated, filterable, and searchable list of all drivers/drivers. Admin only.
    security: [{ BearerAuth: [] }]
    parameters:
      - name: page
        in: query
        schema: { type: integer, minimum: 1, example: 1 }
        description: Page number (must be > 0)
      - name: limit
        in: query
        schema: { type: integer, minimum: 1, maximum: 100, example: 20 }
        description: Results per page (1–100)
      - name: sortBy
        in: query
        schema:
          type: string
          enum: [createdAt, rating, totalTrips, totalEarnings]
          example: createdAt
        description: Field to sort results by
      - name: sortOrder
        in: query
        schema:
          type: string
          enum: [asc, desc]
          example: desc
        description: Sort direction
      - name: search
        in: query
        schema: { type: string, minLength: 1, maxLength: 100, example: khaled }
        description: Search by name, email, or phone
      - name: status
        in: query
        schema:
          type: string
          enum: [all, active, suspended, pending, rejected]
          example: active
        description: Filter by account status
      - name: isVerified
        in: query
        schema:
          type: string
          enum: [all, verified, unverified, pending]
          example: verified
        description: Filter by document verification status
      - name: onlineStatus
        in: query
        schema:
          type: string
          enum: [all, online, offline]
          example: online
        description: Filter by current duty status
    responses:
      '200':
        description: Drivers list retrieved successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data:
                      type: array
                      items: { $ref: '#/components/schemas/Driver' }
                    pagination: { $ref: '#/components/schemas/Pagination' }
      '400':
        description: Validation error in query params
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '403':
        description: Forbidden — admin role required
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

  post:
    tags: [Admin Drivers]
    summary: Create a new driver
    description: Admin creates a new driver account directly.
    security: [{ BearerAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [name]
            properties:
              name:
                type: string
                example: Mahmoud Saad
              email:
                type: string
                format: email
                example: mahmoud@example.com
              phone:
                type: string
                example: '+201155667788'
              drivingLicense:
                type: string
                example: 'DL-20240099'
    responses:
      '201':
        description: Driver created successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data: { $ref: '#/components/schemas/Driver' }
      '400':
        description: Validation error
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '403':
        description: Forbidden — admin role required
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '409':
        description: Email or phone already in use
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

/admin/drivers/{driverId}:
  get:
    tags: [Admin Drivers]
    summary: Get driver by ID
    description: Returns detailed information about a specific driver. Admin only.
    security: [{ BearerAuth: [] }]
    parameters:
      - name: driverId
        in: path
        required: true
        description: UUID of the driver
        schema: { type: string, format: uuid, example: 'a1b2c3d4-e5f6-7890-abcd-ef1234567890' }
    responses:
      '200':
        description: Driver details retrieved successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data: { $ref: '#/components/schemas/Driver' }
      '400':
        description: Validation error (driverId must be a valid UUID)
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '403':
        description: Forbidden — admin role required
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '404':
        description: Driver not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

  put:
    tags: [Admin Drivers]
    summary: Update driver information
    description: Admin updates one or more profile fields for a specific driver.
    security: [{ BearerAuth: [] }]
    parameters:
      - name: driverId
        in: path
        required: true
        description: UUID of the driver
        schema: { type: string, format: uuid, example: 'a1b2c3d4-e5f6-7890-abcd-ef1234567890' }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
                minLength: 2
                maxLength: 100
                example: Khaled Nour
              email:
                type: string
                format: email
                example: khaled@example.com
              phone:
                type: string
                example: '+201012345678'
              language:
                type: string
                enum: [en, ar]
                example: en
              drivingLicense:
                type: string
                minLength: 5
                maxLength: 50
                example: 'DL-20240099'
              licenseExpiryDate:
                type: string
                format: date-time
                example: '2026-06-30T00:00:00Z'
    responses:
      '200':
        description: Driver updated successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data: { $ref: '#/components/schemas/Driver' }
      '400':
        description: Validation error
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '403':
        description: Forbidden — admin role required
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '404':
        description: Driver not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

  delete:
    tags: [Admin Drivers]
    summary: Delete a driver account
    description: |
      Permanently deletes a driver account. **Irreversible.**
      Requires `confirm=true` as a query parameter to prevent accidental deletion.
    security: [{ BearerAuth: [] }]
    parameters:
      - name: driverId
        in: path
        required: true
        description: UUID of the driver
        schema: { type: string, format: uuid, example: 'a1b2c3d4-e5f6-7890-abcd-ef1234567890' }
      - name: confirm
        in: query
        required: true
        description: Must be `true` to confirm permanent deletion
        schema: { type: string, enum: ['true'], example: 'true' }
    responses:
      '200':
        description: Driver deleted successfully
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SuccessResponse' }
      '400':
        description: Validation error or missing confirm=true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '403':
        description: Forbidden — admin role required
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '404':
        description: Driver not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

/admin/drivers/{driverId}/approve:
  post:
    tags: [Admin Drivers]
    summary: Approve driver verification
    description: Approves a driver's submitted documents and activates their account.
    security: [{ BearerAuth: [] }]
    parameters:
      - name: driverId
        in: path
        required: true
        description: UUID of the driver
        schema: { type: string, format: uuid, example: 'a1b2c3d4-e5f6-7890-abcd-ef1234567890' }
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              reason:
                type: string
                maxLength: 500
                example: 'All documents verified and valid.'
    responses:
      '200':
        description: Driver approved successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data: { $ref: '#/components/schemas/Driver' }
      '400':
        description: Validation error
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '403':
        description: Forbidden — admin role required
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '404':
        description: Driver not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '409':
        description: Driver is already approved
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

/admin/drivers/{driverId}/reject:
  post:
    tags: [Admin Drivers]
    summary: Reject driver application
    description: Rejects a driver's submitted documents. A reason is required.
    security: [{ BearerAuth: [] }]
    parameters:
      - name: driverId
        in: path
        required: true
        description: UUID of the driver
        schema: { type: string, format: uuid, example: 'a1b2c3d4-e5f6-7890-abcd-ef1234567890' }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [reason]
            properties:
              reason:
                type: string
                minLength: 10
                maxLength: 500
                example: 'Driving license image was blurry and unreadable.'
    responses:
      '200':
        description: Driver application rejected successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data: { $ref: '#/components/schemas/Driver' }
      '400':
        description: Validation error (reason required, min 10 chars)
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '403':
        description: Forbidden — admin role required
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '404':
        description: Driver not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

/admin/drivers/{driverId}/suspend:
  post:
    tags: [Admin Drivers]
    summary: Suspend or unsuspend a driver
    description: |
      Toggles the suspension status of a driver account.
      Use `action: "suspend"` to suspend and `action: "unsuspend"` to lift a suspension.
      This is the single canonical route for suspension management.
    security: [{ BearerAuth: [] }]
    parameters:
      - name: driverId
        in: path
        required: true
        description: UUID of the driver
        schema: { type: string, format: uuid, example: 'a1b2c3d4-e5f6-7890-abcd-ef1234567890' }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [action]
            properties:
              action:
                type: string
                enum: [suspend, unsuspend]
                example: suspend
              reason:
                type: string
                minLength: 5
                maxLength: 500
                example: 'Multiple passenger complaints within 7 days.'
              durationDays:
                type: integer
                minimum: 1
                maximum: 365
                example: 14
                description: Optional suspension duration in days. If omitted, suspension is indefinite.
    responses:
      '200':
        description: Suspension status updated successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data: { $ref: '#/components/schemas/Driver' }
      '400':
        description: Validation error
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '403':
        description: Forbidden — admin role required
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '404':
        description: Driver not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

/admin/drivers/{driverId}/refund:
  post:
    tags: [Admin Drivers]
    summary: Issue a refund to driver wallet
    description: Credits a refund amount directly to the driver's in-app wallet. Optionally linked to a trip.
    security: [{ BearerAuth: [] }]
    parameters:
      - name: driverId
        in: path
        required: true
        description: UUID of the driver
        schema: { type: string, format: uuid, example: 'a1b2c3d4-e5f6-7890-abcd-ef1234567890' }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [amount, currency, reason]
            properties:
              amount:
                type: number
                format: float
                minimum: 0.01
                example: 50.00
                description: Refund amount (must be > 0)
              currency:
                type: string
                minLength: 3
                maxLength: 3
                example: EGP
                description: ISO 4217 currency code (3 characters, uppercased automatically)
              tripId:
                type: string
                format: uuid
                example: 'b2c3d4e5-f6a7-8901-bcde-f12345678901'
                description: Optional trip UUID this refund is associated with
              reason:
                type: string
                minLength: 5
                maxLength: 200
                example: 'Incorrect fare deduction due to system error.'
    responses:
      '200':
        description: Refund issued successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data: { $ref: '#/components/schemas/Wallet' }
      '400':
        description: Validation error
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '403':
        description: Forbidden — admin role required
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '404':
        description: Driver not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

/admin/drivers/{driverId}/reset-password:
  post:
    tags: [Admin Drivers]
    summary: Reset driver password
    description: Admin sets a new password for a specific driver account.
    security: [{ BearerAuth: [] }]
    parameters:
      - name: driverId
        in: path
        required: true
        description: UUID of the driver
        schema: { type: string, format: uuid, example: 'a1b2c3d4-e5f6-7890-abcd-ef1234567890' }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [newPassword]
            properties:
              newPassword:
                type: string
                minLength: 8
                example: 'NewStr0ng#Pass'
                description: New password (minimum 8 characters)
    responses:
      '200':
        description: Password reset successfully
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SuccessResponse' }
      '400':
        description: Validation error (password too short)
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '403':
        description: Forbidden — admin role required
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      '404':
        description: Driver not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
