/trips/estimate:
  get:
    tags: [Trips]
    summary: Get fare estimates for all services based on pickup and dropoff locations
    parameters:
      - name: lat_pick
        in: query
        required: true
        schema: { type: number, format: float }
        description: Pickup latitude
      - name: lng_pick
        in: query
        required: true
        schema: { type: number, format: float }
        description: Pickup longitude
      - name: lat_drop
        in: query
        required: true
        schema: { type: number, format: float }
        description: Dropoff latitude
      - name: lng_drop
        in: query
        required: true
        schema: { type: number, format: float }
        description: Dropoff longitude
    responses:
      '200':
        description: Fare estimates for all active services
        content:
          application/json:
            schema:
              properties:
                data:
                  type: array
                  items:
                    type: object
                    properties:
                      serviceId:     { type: string, format: uuid }
                      serviceName:   { type: string, example: Normal }
                      distanceKm:    { type: number, example: 10.69 }
                      farePerKm:     { type: number, example: 5.0 }
                      driverEarnings: { type: number, example: 53.45, description: 'What the driver receives' }
                      commission:    { type: number, example: 9.52, description: "Platform commission added on top" }
                      fare:          { type: number, example: 62.97, description: 'Total charged to the customer' }
                      currency:      { type: string, example: EGP }
      '400': { description: Invalid coordinates }

/trips/regions/active:
  get:
    tags: [Trips]
    summary: Get active service regions
    description: |
      Retrieve all active circular service regions where customers can place orders.
      Returns region boundaries with center coordinates and radius.
      **No authentication required** - Public endpoint for client apps.
    responses:
      '200':
        description: Active service regions
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                data:
                  type: array
                  items:
                    type: object
                    properties:
                      id:     { type: string, format: uuid }
                      name:   { type: string, example: 'Downtown Cairo' }
                      lat:    { type: number, example: 30.0444, description: 'Center latitude' }
                      lng:    { type: number, example: 31.2357, description: 'Center longitude' }
                      radius: { type: number, example: 25.5, description: 'Radius in kilometers' }

/trips:
  post:
    tags: [Trips]
    summary: Create a new trip request
    description: |
      Create a new trip request. The pickup location must be within one of the defined service regions.

      **Payment options:**
      - `payment_type: cash` — no `payment_method_id` required.
      - `payment_type: instapay` — `payment_method_id` (UUID of a saved payment method) is optional.

      **Note**: Pickup location is validated against active service regions. If outside all regions, request will be rejected with 422.
    security: [{ BearerAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            required: [pickup_lat, pickup_lng, pickup_address, dropoff_lat, dropoff_lng, dropoff_address, service_id, payment_type]
            properties:
              pickup_lat:        { type: number, example: 30.0444 }
              pickup_lng:        { type: number, example: 31.2357 }
              pickup_address:    { type: string }
              dropoff_lat:       { type: number, example: 30.1050 }
              dropoff_lng:       { type: number, example: 31.3100 }
              dropoff_address:   { type: string }
              service_id:        { type: string, format: uuid, description: 'Service/vehicle type ID' }
              payment_type:
                type: string
                enum: [cash, instapay]
                example: cash
                description: 'Payment method type.'
              payment_method_id:
                type: string
                format: uuid
                description: 'Optional UUID of the user''s saved payment method.'
          examples:
            cash:
              summary: Pay with cash
              value:
                pickup_lat: 30.0444
                pickup_lng: 31.2357
                pickup_address: '123 Main St, Cairo'
                dropoff_lat: 30.1050
                dropoff_lng: 31.3100
                dropoff_address: '456 Side St, Cairo'
                service_id: 'a1b2c3d4-e5f6-7890-abcd-ef1234567890'
                payment_type: cash
            instapay:
              summary: Pay with Instapay (optional method)
              value:
                pickup_lat: 30.0444
                pickup_lng: 31.2357
                pickup_address: '123 Main St, Cairo'
                dropoff_lat: 30.1050
                dropoff_lng: 31.3100
                dropoff_address: '456 Side St, Cairo'
                service_id: 'a1b2c3d4-e5f6-7890-abcd-ef1234567890'
                payment_type: instapay
                payment_method_id: 'b2c3d4e5-f6a7-8901-bcde-f12345678901'
    responses:
      '201':
        description: Trip created
        content:
          application/json:
            schema:
              properties:
                data: { $ref: '#/components/schemas/Trip' }
      '400':
        description: 'invalid payment_type or payment_method_id'
      '422':
        description: 'Pickup location is outside all service regions'
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: false }
                message:
                  type: string
                  example: 'Pickup location is outside all service regions. Please select a location within the service area.'
  get:
    tags: [Trips]
    summary: Get user trip history
    security: [{ BearerAuth: [] }]
    parameters:
      - { name: page,     in: query, schema: { type: integer, default: 1 } }
      - { name: per_page, in: query, schema: { type: integer, default: 20 } }
    responses:
      '200': { description: Trip history }

/trips/nearby-captains:
  get:
    tags: [Trips]
    summary: Get nearby available captains
    description: Returns a list of captains currently online and within the given radius, optionally filtered by service type. Data is served from the in-memory location store updated in real-time via Socket.io.
    security: [{ BearerAuth: [] }]
    parameters:
      - name: latitude
        in: query
        required: true
        schema: { type: number, example: 30.0444 }
      - name: longitude
        in: query
        required: true
        schema: { type: number, example: 31.2357 }
      - name: radius
        in: query
        required: false
        schema: { type: number, default: 5, example: 10 }
        description: Search radius in kilometers (default 5)
      - name: serviceId
        in: query
        required: false
        schema: { type: string, format: uuid }
        description: Filter captains by service type UUID
    responses:
      '200':
        description: List of nearby captains
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                data:
                  type: array
                  items:
                    type: object
                    properties:
                      id:        { type: string, format: uuid }
                      lat:       { type: number, example: 30.0500 }
                      lng:       { type: number, example: 31.2400 }
                      serviceId: { type: string, format: uuid }
      '401': { description: Unauthorized }

/trips/{id}:
  get:
    tags: [Trips]
    summary: Get trip details
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    responses:
      '200':
        description: Trip details
        content:
          application/json:
            schema:
              properties:
                data: { $ref: '#/components/schemas/Trip' }

/trips/{id}/rating:
  post:
    tags: [Trips]
    summary: Rate captain after completed trip
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            required: [rating]
            properties:
              rating:  { type: integer, minimum: 1, maximum: 5 }
              comment: { type: string }
    responses:
      '201': { description: Rating submitted }
