Trip:
  type: object
  description: >
    `originalFare` is the trip price before discounts, `discountAmount` is the applied coupon value,
    and `finalFare` is always `originalFare - discountAmount`.
  properties:
    id: { type: string, format: uuid }
    status:
      type: string
      enum: [searching, matched, on_way, in_progress, completed, cancelled]
    pickupAddress:    { type: string }
    dropoffAddress:   { type: string }
    pickupLat:        { type: number }
    pickupLng:        { type: number }
    dropoffLat:       { type: number }
    dropoffLng:       { type: number }
    finalFare:        { type: number, example: 275.00 }
    originalFare:     { type: number, example: 300.00, nullable: true }
    discountAmount:   { type: number, example: 25.00 }
    couponCode:       { type: string, nullable: true }
    currency:         { type: string, example: EGP }
    distanceKm:       { type: number }
    durationMinutes:  { type: integer }
    totalAmount:      { type: number }
    startAddress:     { type: string }
    driver:
      type: object
      properties:
        firstName: { type: string }
        lastName:  { type: string }
    isSchedule:       { type: boolean }
    scheduleDatetime: { type: string, format: date-time }
    driver:
      $ref: '../drivers/schemas.yaml#/Driver'
    createdAt:  { type: string, format: date-time }
    startedAt:  { type: string, format: date-time, nullable: true }
    endedAt:    { type: string, format: date-time, nullable: true }

RideCreate:
  type: object
  required: [userId, pickupLat, pickupLng, dropoffLat, dropoffLng, pickupAddress, dropoffAddress]
  properties:
    userId:         { type: string, format: uuid }
    driverId:      { type: string, format: uuid }
    pickupLat:      { type: number }
    pickupLng:      { type: number }
    dropoffLat:     { type: number }
    dropoffLng:     { type: number }
    pickupAddress:  { type: string }
    dropoffAddress: { type: string }
    finalFare:      { type: number }
    originalFare:   { type: number }
    distanceKm:     { type: number }
    status:         { type: string }

RideUpdate:
  type: object
  properties:
    status:       { type: string }
    finalFare:    { type: number }
    originalFare: { type: number }
    driverId:    { type: string, format: uuid }

Rating:
  type: object
  properties:
    id:        { type: string, format: uuid }
    stars:     { type: integer, minimum: 1, maximum: 5 }
    comment:   { type: string, nullable: true }
    createdAt: { type: string, format: date-time }
