# Auth module does not define its own domain schemas.
# It references User from ../users/schemas.yaml and Driver from ../drivers/schemas.yaml.
# Token response shapes are defined inline within paths.yaml.

SuccessResponse:
  type: object
  properties:
    success:
      type: boolean
      example: true
    message:
      type: string
      example: Success
    data:
      type: object

ErrorResponse:
  type: object
  properties:
    success:
      type: boolean
      example: false
    message:
      type: string
      example: Validation error
    errors:
      type: array
      nullable: true
      items:
        type: object

Pagination:
  type: object
  properties:
    page: { type: integer, example: 1 }
    per_page: { type: integer, example: 20 }
    total: { type: integer, example: 100 }
    total_pages: { type: integer, example: 5 }
