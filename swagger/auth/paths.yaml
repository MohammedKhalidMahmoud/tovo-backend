/auth/register/user:
  post:
    tags: [Auth]
    summary: Register passenger account
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [name, email, phone, password, confirm_password]
            properties:
              name: { type: string, example: Heba Yasser }
              email: { type: string, format: email }
              phone: { type: string, example: '+201012345678' }
              password: { type: string, minLength: 8 }
              confirm_password: { type: string }
    responses:
      '201':
        description: User registered
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - properties:
                    data:
                      $ref: '#/components/schemas/User'
      '409': { description: Email or phone already exists }

/auth/register/driver:
  post:
    tags: [Auth]
    summary: Register driver (driver) account
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [name, email, phone, driving_license, password, confirm_password, vehicle_model, vin]
            properties:
              name: { type: string }
              email: { type: string, format: email }
              phone: { type: string }
              driving_license: { type: string }
              password: { type: string, minLength: 8 }
              confirm_password: { type: string }
              vehicle_model:
                type: string
                example: 'Toyota Camry'
                description: "Exact name of an active VehicleModel from GET /vehicle-models. Registration is rejected if the model is not in the whitelist or is inactive."
              vin: { type: string, description: Vehicle Identification Number }
    responses:
      '201': { description: Driver registered }
      '409': { description: Email or phone already exists }

/auth/login:
  post:
    tags: [Auth]
    summary: Login for customers and drivers
    description: >
      Accepts `identifier` as either an email address (contains `@`) or a phone number.
      The backend determines the account role automatically from the matched user record.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [identifier, password]
            properties:
              identifier:
                type: string
                description: Email address or phone number
                example: '+201012345678'
              password: { type: string }
    responses:
      '200':
        description: Login successful
        content:
          application/json:
            schema:
              properties:
                data:
                  properties:
                    accessToken: { type: string }
                    refreshToken: { type: string }
                    role: { type: string, enum: [customer, driver] }
                    user: { $ref: '#/components/schemas/User' }
      '401': { description: Invalid credentials }
      '400': { description: Validation failed }

/auth/admin/login:
  post:
    tags: [Auth]
    summary: Admin login
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [email, password]
            properties:
              email: { type: string, format: email }
              password: { type: string }
    responses:
      '200':
        description: Login successful
        content:
          application/json:
            schema:
              properties:
                data:
                  properties:
                    accessToken: { type: string }
                    refreshToken: { type: string }
                    role: { type: string, example: admin }
                    user:
                      type: object
                      properties:
                        id: { type: string, format: uuid }
                        email: { type: string, format: email }
                        role: { type: string, example: admin }
                        isActive: { type: boolean }
      '401': { description: Invalid credentials }
      '403': { description: Admin account is deactivated }

/auth/logout:
  post:
    tags: [Auth]
    summary: Logout the authenticated actor
    description: >
      Requires a bearer access token. If `refreshToken` is provided, it must belong to the same
      authenticated actor and will be revoked. If `fcm_token` is provided, only a device token
      owned by the authenticated actor will be deregistered.
    security: [{ BearerAuth: [] }]
    requestBody:
      content:
        application/json:
          schema:
            properties:
              refreshToken: { type: string, example: eyJhbGciOi... }
              fcm_token: { type: string, description: FCM device token to deregister }
    responses:
      '200': { description: Logged out }
      '401': { description: Invalid or expired access/refresh token }
      '403': { description: Refresh token does not belong to the authenticated actor }

/auth/token/refresh:
  post:
    tags: [Auth]
    summary: Refresh access token
    requestBody:
      required: true
      content:
        application/json:
          schema:
            required: [refreshToken]
            properties:
              refreshToken: { type: string }
    responses:
      '200':
        description: New access token
        content:
          application/json:
            schema:
              properties:
                data:
                  properties:
                    accessToken: { type: string }
      '401': { description: Refresh token is invalid or expired }

/auth/otp/verify:
  post:
    tags: [Auth]
    summary: Verify Firebase phone authentication
    description: >
      The client completes Firebase phone authentication and sends the resulting Firebase ID token
      to this endpoint. The backend verifies the token with Firebase Admin SDK, extracts the phone
      number, and either logs in the existing user or returns a registration-required response for
      new phone numbers.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            required: [id_token]
            properties:
              id_token:
                type: string
                description: Firebase Authentication ID token issued after successful client-side phone verification
    responses:
      '200':
        description: Existing user logged in or new phone verified for registration
        content:
          application/json:
            schema:
              properties:
                data:
                  oneOf:
                    - type: object
                      properties:
                        flow: { type: string, example: login }
                        verified: { type: boolean, example: true }
                        accessToken: { type: string }
                        refreshToken: { type: string }
                        role: { type: string, enum: [customer, driver] }
                        user: { $ref: '#/components/schemas/User' }
                    - type: object
                      properties:
                        flow: { type: string, example: register }
                        requiresRegistration: { type: boolean, example: true }
                        verified: { type: boolean, example: true }
                        phone: { type: string, example: '+201012345678' }
      '400': { description: Validation failed or phone number missing from token }
      '401': { description: Invalid or expired Firebase ID token }
      '500': { description: Phone authentication is not configured }

/auth/forgot-password:
  post:
    tags: [Auth]
    summary: Request password reset
    requestBody:
      required: true
      content:
        application/json:
          schema:
            required: [email]
            properties:
              email: { type: string, format: email }
    responses:
      '200': { description: Reset email sent }

/auth/reset-password:
  post:
    tags: [Auth]
    summary: Reset password using email OTP
    description: Verify the 6-digit OTP sent to the user's email and set a new password.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            required: [email, otp, new_password]
            properties:
              email: { type: string, format: email }
              otp: { type: string, minLength: 6, maxLength: 6, example: '847291' }
              new_password: { type: string, minLength: 8 }
    responses:
      '200': { description: Password updated successfully }
      '400': { description: Invalid or expired OTP }

/auth/social:
  post:
    tags: [Auth]
    summary: Social login (Google / Facebook / Apple)
    description: |
      Authenticate using a social provider token. Finds or creates a Tovo account.

      **Google:** send the `id_token` returned by Google Sign-In SDK as `access_token`.

      **Facebook:** send the `access_token` returned by Facebook Login SDK as `access_token`.

      **Apple:** send the `identityToken` (JWT) returned by Apple Sign-In SDK as `access_token`.
      Note: Apple only provides `email` on the first sign-in. Subsequent sign-ins include only the user ID.

      **Find-or-create logic:**
      1. Lookup by social ID (`googleId` / `facebookId` / `appleId`) — returning user, issues tokens immediately.
      2. Lookup by email — links the social ID to the existing account, then issues tokens.
      3. If not found — creates a new account (`isVerified: true`, wallet auto-created, phone optional).

      A `409` is returned if the matched email/social ID belongs to a different `role`.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [provider, access_token, role]
            properties:
              provider:
                type: string
                enum: [google, facebook, apple]
                example: google
              access_token:
                type: string
                description: >
                  Google: the `id_token` from Google Sign-In.
                  Facebook: the `access_token` from Facebook Login.
                  Apple: the `identityToken` (JWT) from Apple Sign-In.
              role:
                type: string
                enum: [customer, driver]
                example: customer
    responses:
      '200':
        description: Social login successful — returns the same token shape as regular login
        content:
          application/json:
            schema:
              properties:
                data:
                  properties:
                    accessToken: { type: string }
                    refreshToken: { type: string }
                    role: { type: string, enum: [customer, driver] }
                    user: { $ref: '#/components/schemas/User' }
      '400': { description: Missing or invalid fields }
      '401': { description: Invalid or expired social token }
      '409': { description: Email/social ID already registered under a different role }
      '502': { description: Could not reach Facebook API }
