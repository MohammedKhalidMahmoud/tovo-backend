/admin/payments:
  get:
    tags: [Admin]
    summary: View payments
    security: [{ BearerAuth: [] }]
    parameters:
      - name: page
        in: query
        schema: { type: integer, default: 1 }
      - name: limit
        in: query
        schema: { type: integer, default: 20 }
      - name: status
        in: query
        schema: { type: string }
      - name: userId
        in: query
        schema: { type: string }
      - name: driverId
        in: query
        schema: { type: string }
      - name: dateFrom
        in: query
        schema: { type: string, format: date-time }
      - name: dateTo
        in: query
        schema: { type: string, format: date-time }
    responses:
      '200': { description: Payments list }

/admin/payments/{id}/refund:
  post:
    tags: [Admin]
    summary: Issue refund
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            properties:
              amount: { type: number }
              reason: { type: string }
    responses:
      '200': { description: Refund issued }
