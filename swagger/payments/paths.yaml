/payments/me:
  get:
    tags: [Payments]
    summary: Get my payment history
    description: Returns the authenticated user's own completed trip payments, paginated.
    security: [{ BearerAuth: [] }]
    parameters:
      - name: page
        in: query
        schema: { type: integer, default: 1 }
      - name: limit
        in: query
        schema: { type: integer, default: 20 }
    responses:
      '200':
        description: Paginated list of payments
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data:
                      type: array
                      items: { $ref: '#/components/schemas/Payment' }
      '401': { description: Unauthorized }

/payments/{id}:
  get:
    tags: [Payments]
    summary: Get a single payment
    description: |
      Returns a single payment (completed trip) by ID.
      - Users can only access their own payments.
      - Admins can access any payment.
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: Payment details
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data: { $ref: '#/components/schemas/Payment' }
      '401': { description: Unauthorized }
      '403': { description: Forbidden — user attempted to access another user's payment }
      '404': { description: Payment not found }

/admin/payments:
  get:
    tags: [Payments]
    summary: List all payments
    description: Admin endpoint — returns all completed trip payments with optional filters.
    security: [{ BearerAuth: [] }]
    parameters:
      - name: page
        in: query
        schema: { type: integer, default: 1 }
      - name: limit
        in: query
        schema: { type: integer, default: 20 }
      - name: userId
        in: query
        description: Filter by user (rider) ID
        schema: { type: string, format: uuid }
      - name: driverId
        in: query
        description: Filter by captain (driver) ID
        schema: { type: string, format: uuid }
      - name: paymentType
        in: query
        description: Filter by payment type
        schema: { type: string, enum: [cash, card] }
      - name: dateFrom
        in: query
        schema: { type: string, format: date-time }
      - name: dateTo
        in: query
        schema: { type: string, format: date-time }
    responses:
      '200':
        description: Paginated list of payments
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data:
                      type: array
                      items: { $ref: '#/components/schemas/Payment' }
      '401': { description: Unauthorized }
      '403': { description: Forbidden — admin only }

/admin/payments/{id}/refund:
  post:
    tags: [Payments]
    summary: Issue a refund
    description: |
      Credits the rider's wallet with the specified amount.
      **Guards:**
      - Trip must have status `completed`
      - Payment type must be `card` (cash payments were not collected by the platform)
      - Amount cannot exceed the final fare actually paid by the rider
      - A trip can only be refunded once
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [amount, reason]
            properties:
              amount:
                type: number
                example: 50.00
                description: Amount to credit to the user's wallet (must not exceed final fare)
              reason:
                type: string
                example: Customer complaint — late arrival
    responses:
      '200':
        description: Refund issued successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - type: object
                  properties:
                    data: { $ref: '#/components/schemas/RefundResponse' }
      '401': { description: Unauthorized }
      '403': { description: Forbidden — admin only }
      '404': { description: Payment or user wallet not found }
      '409': { description: Conflict — this payment has already been refunded }
      '422': { description: Trip not completed, payment type is cash, or amount exceeds final fare }
