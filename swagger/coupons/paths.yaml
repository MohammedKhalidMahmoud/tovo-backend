/promotions:
  get:
    tags: [Promotions]
    summary: List active promotions/coupons (public)
    responses:
      '200':
        description: Promotions list
        content:
          application/json:
            schema:
              properties:
                data:
                  type: array
                  items: { $ref: '#/components/schemas/Promotion' }

/promotions/coupons/validate:
  post:
    tags: [Promotions]
    summary: Validate a coupon code (public)
    requestBody:
      required: true
      content:
        application/json:
          schema:
            required: [code]
            properties:
              code: { type: string }
    responses:
      '200':
        description: Coupon is valid
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Promotion'
      '404': { description: Coupon not found }
      '422': { description: Coupon is expired, inactive, or usage limit reached }

/admin/promotions/coupons:
  get:
    tags: [Admin]
    summary: List all coupons with filtering (admin)
    security: [{ BearerAuth: [] }]
    parameters:
      - name: page
        in: query
        schema: { type: integer, default: 1 }
      - name: limit
        in: query
        schema: { type: integer, default: 20 }
      - name: status
        in: query
        schema: { type: string, enum: [all, active, inactive] }
      - name: search
        in: query
        schema: { type: string }
    responses:
      '200':
        description: Coupons list with pagination
        content:
          application/json:
            schema:
              properties:
                data:
                  type: array
                  items: { $ref: '#/components/schemas/Promotion' }
                pagination: { $ref: '#/components/schemas/Pagination' }
      '401': { description: Unauthorized }
      '403': { description: Admin access required }
  post:
    tags: [Admin]
    summary: Create a new coupon (admin)
    security: [{ BearerAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Promotion'
    responses:
      '201':
        description: Coupon created successfully
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Promotion'
      '400': { description: Invalid request body }
      '401': { description: Unauthorized }
      '403': { description: Admin access required }

/admin/promotions/coupons/{id}:
  get:
    tags: [Admin]
    summary: Get coupon details (admin)
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: Coupon details
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Promotion'
      '401': { description: Unauthorized }
      '403': { description: Admin access required }
      '404': { description: Coupon not found }
  put:
    tags: [Admin]
    summary: Update coupon details (admin)
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Promotion'
    responses:
      '200':
        description: Coupon updated successfully
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Promotion'
      '400': { description: Invalid request body }
      '401': { description: Unauthorized }
      '403': { description: Admin access required }
      '404': { description: Coupon not found }
  delete:
    tags: [Admin]
    summary: Delete a coupon (admin)
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200': { description: Coupon deleted successfully }
      '401': { description: Unauthorized }
      '403': { description: Admin access required }
      '404': { description: Coupon not found }
