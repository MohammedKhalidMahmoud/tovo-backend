/admin/commission-rules:
  get:
    tags: [Commission Rules]
    summary: List all commission rules
    security: [{ BearerAuth: [] }]
    responses:
      '200':
        description: List of commission rules
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                data:
                  type: array
                  items: { $ref: '#/components/schemas/CommissionRule' }

  post:
    tags: [Commission Rules]
    summary: Create a commission rule
    description: |
      Creates a new commission rule. The rule is always created with `status: false` (inactive).
      Use the `/activate` endpoint to make it active.
    security: [{ BearerAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [name, type, config]
            properties:
              name:
                type: string
                example: Default Fixed Commission
              type:
                type: string
                enum: [fixed_amount, percentage, tiered_fixed, tiered_percentage]
                example: fixed_amount
              serviceId:
                type: string
                format: uuid
                nullable: true
                description: 'Omit or set null for a global rule. Set a service UUID for a service-specific rule.'
              config:
                description: 'Shape depends on type'
                example:
                  - minFare: 0
                    maxFare: 99.99
                    amount: 5
                  - minFare: 100
                    maxFare: null
                    amount: 10
    responses:
      '201':
        description: Commission rule created (inactive)
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean }
                data:    { $ref: '#/components/schemas/CommissionRule' }
      '400':
        description: Validation error (invalid type or config shape)

/admin/commission-rules/{id}:
  get:
    tags: [Commission Rules]
    summary: Get a single commission rule
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: Commission rule details
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean }
                data:    { $ref: '#/components/schemas/CommissionRule' }
      '404': { description: Commission rule not found }

  patch:
    tags: [Commission Rules]
    summary: Update a commission rule
    description: |
      Updates editable fields of a commission rule (name, type, config, serviceId).
      **`status` cannot be changed here** — use the `/activate` endpoint instead.
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
                example: Updated Rule Name
              type:
                type: string
                enum: [fixed_amount, percentage, tiered_fixed, tiered_percentage]
              serviceId:
                type: string
                format: uuid
                nullable: true
              config:
                description: 'Shape depends on type'
    responses:
      '200':
        description: Updated commission rule
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean }
                data:    { $ref: '#/components/schemas/CommissionRule' }
      '400': { description: Validation error }
      '404': { description: Commission rule not found }

  delete:
    tags: [Commission Rules]
    summary: Delete a commission rule
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200': { description: Commission rule deleted }
      '404': { description: Commission rule not found }

/admin/commission-rules/{id}/activate:
  patch:
    tags: [Commission Rules]
    summary: Activate a commission rule
    description: |
      Atomically activates the specified rule and deactivates any currently active rule
      for the same `serviceId` (or global scope if `serviceId` is null).

      Only one rule can be active per service at any time.
    security: [{ BearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: Rule activated successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                message: { type: string, example: Commission rule activated }
                data:    { $ref: '#/components/schemas/CommissionRule' }
      '404': { description: Commission rule not found }
