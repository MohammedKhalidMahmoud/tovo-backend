CommissionRule:
  type: object
  properties:
    id:
      type: string
      format: uuid
    name:
      type: string
      example: Default Fixed Commission
    type:
      type: string
      enum: [fixed_amount, percentage, tiered_fixed, tiered_percentage]
      example: fixed_amount
    status:
      type: boolean
      example: false
      description: 'false by default. Only one rule can be active at a time.'
    config:
      description: 'Shape depends on type — see examples below'
      oneOf:
        - title: percentage
          type: object
          properties:
            pct: { type: number, example: 15 }
        - title: fixed_amount / tiered_fixed / tiered_percentage
          type: array
          items:
            type: object
            properties:
              minFare:  { type: number, example: 0 }
              maxFare:  { type: number, nullable: true, example: 99.99 }
              amount:   { type: number, example: 5, description: 'Used for fixed_amount and tiered_fixed' }
              pct:      { type: number, example: 8, description: 'Used for tiered_percentage' }
    createdAt: { type: string, format: date-time }
    updatedAt: { type: string, format: date-time }
